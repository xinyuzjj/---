<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暗黑要塞 - 堡垒防守战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Microsoft YaHei','PingFang SC',sans-serif;cursor:crosshair;user-select:none}
canvas{display:block}
#startScreen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#0a0a1a 0%,#000 70%)}
#startScreen h1{font-size:52px;color:#f0c040;text-shadow:0 0 30px #f0c04088,0 0 60px #f0c04044,0 3px 0 #4a3000;letter-spacing:10px;margin-bottom:4px;animation:glow 2s ease-in-out infinite}
#startScreen .sub{color:#8a7a50;font-size:14px;letter-spacing:5px;margin-bottom:10px}
#startScreen button{padding:14px 44px;font-size:18px;background:linear-gradient(180deg,#3a2a10,#2a1a08);border:2px solid #f0c040;color:#f0c040;cursor:pointer;letter-spacing:6px;font-family:inherit;transition:all .3s;border-radius:4px}
#startScreen button:hover{background:linear-gradient(180deg,#5a4a20,#3a2a10);box-shadow:0 0 25px #f0c04044}
#startScreen .controls{position:absolute;bottom:30px;color:#5a5030;font-size:10px;letter-spacing:1px;text-align:center;line-height:2.2}
@keyframes glow{0%,100%{text-shadow:0 0 30px #f0c04088,0 0 60px #f0c04044,0 3px 0 #4a3000}50%{text-shadow:0 0 50px #f0c040aa,0 0 80px #f0c04066,0 3px 0 #4a3000}}
#deathScreen{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,0,0,.94)}
#deathScreen h1{font-size:56px;color:#c41e1e;letter-spacing:8px;margin-bottom:12px}
#deathScreen .sub2{color:#f0c040;font-size:16px;margin-bottom:8px}
#deathScreen .stats{color:#886;font-size:13px;margin-bottom:36px;text-align:center;line-height:2.2}
#deathScreen button{padding:12px 36px;font-size:16px;background:none;border:2px solid #c41e1e;color:#c41e1e;cursor:pointer;letter-spacing:4px;font-family:inherit;border-radius:4px}
#deathScreen button:hover{background:#c41e1e;color:#000}
#shopScreen{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.82)}
#shopPanel{background:linear-gradient(180deg,#1e1a14,#141210);border:2px solid #5a4a2a;padding:20px;min-width:500px;border-radius:6px}
#shopPanel h2{color:#f0c040;font-size:16px;letter-spacing:3px;margin-bottom:14px;text-align:center;border-bottom:1px solid #3a3020;padding-bottom:8px}
.shop-tabs{display:flex;gap:4px;margin-bottom:12px}
.shop-tab{flex:1;padding:8px;text-align:center;background:#1a1610;border:1px solid #3a3020;color:#886;cursor:pointer;font-size:12px;border-radius:3px}
.shop-tab.active{background:#2a2418;border-color:#f0c040;color:#f0c040}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:340px;overflow-y:auto}
.shop-item{background:#12100c;border:1px solid #332;padding:8px;cursor:pointer;display:flex;gap:8px;align-items:center;border-radius:3px;transition:border-color .15s}
.shop-item:hover{border-color:#f0c040}
.shop-item .si-icon{font-size:22px;width:36px;text-align:center}
.shop-item .si-info{flex:1;font-size:11px;color:#aa8;line-height:1.6}
.shop-item .si-name{font-size:12px;font-weight:bold}
.shop-item .si-cost{color:#f0c040;font-size:11px}
.shop-item .si-stats{color:#886;font-size:10px}
#invScreen{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.82)}
#invPanel{background:linear-gradient(180deg,#1e1a14,#141210);border:2px solid #5a4a2a;padding:20px;display:flex;gap:20px;border-radius:6px}
.inv-left{width:300px}
.inv-right{width:200px}
.inv-title{color:#f0c040;font-size:14px;letter-spacing:3px;margin-bottom:10px;text-align:center;border-bottom:1px solid #3a3020;padding-bottom:6px}
.inv-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:10px}
.inv-slot{width:44px;height:44px;background:#0d0a08;border:1px solid #2a2418;display:flex;align-items:center;justify-content:center;font-size:18px;position:relative;cursor:pointer;border-radius:2px;transition:border-color .15s}
.inv-slot:hover{border-color:#f0c040}
.inv-slot .qty{position:absolute;bottom:0;right:2px;font-size:8px;color:#aa8}
.slot-icon{font-size:22px;filter:drop-shadow(0 0 5px rgba(240,192,64,.35));text-shadow:0 1px 0 #000}
.equip-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:10px}
.equip-slot{width:50px;height:50px;background:#12100c;border:1px solid #3a3020;display:flex;align-items:center;justify-content:center;font-size:18px;position:relative;cursor:pointer;border-radius:2px}
.equip-slot:hover{border-color:#f0c040}
.equip-slot .slabel{position:absolute;top:1px;left:2px;font-size:7px;color:#786b45}
.equip-slot .slot-icon{font-size:23px}
.inv-slot.rarity-3,.equip-slot.rarity-3{animation:rarityPulseEpic 1.8s ease-in-out infinite}
.inv-slot.rarity-4,.equip-slot.rarity-4{animation:rarityPulseLegend 1.4s ease-in-out infinite}
.equip-slot.set-item{border-color:#ffd700;box-shadow:0 0 6px #ffd70066}
@keyframes rarityPulseEpic{
  0%,100%{box-shadow:0 0 0 rgba(160,110,255,0),inset 0 0 0 rgba(160,110,255,0)}
  50%{box-shadow:0 0 12px rgba(160,110,255,.45),inset 0 0 8px rgba(120,70,220,.35)}
}
@keyframes rarityPulseLegend{
  0%,100%{box-shadow:0 0 0 rgba(255,190,80,0),inset 0 0 0 rgba(255,190,80,0)}
  50%{box-shadow:0 0 14px rgba(255,190,80,.55),inset 0 0 10px rgba(255,160,40,.35)}
}
.inv-stats{color:#886;font-size:10px;line-height:1.8}
.inv-stats span{color:#f0c040}
.inv-stats .r{color:#c44}.inv-stats .b{color:#48c}.inv-stats .g{color:#4a8}
.tooltip{position:fixed;z-index:200;background:#1a1610;border:1px solid #5a4a2a;padding:8px 12px;color:#aa8;font-size:11px;line-height:1.7;pointer-events:none;display:none;max-width:220px;border-radius:4px;box-shadow:0 4px 16px rgba(0,0,0,.6)}
.tooltip .tn{font-weight:bold;margin-bottom:2px}
.keybindings{position:fixed;bottom:20px;left:20px;z-index:80;background:rgba(26,22,16,0.8);border:1px solid #5a4a2a;padding:12px;border-radius:6px;max-width:200px}
.kb-title{color:#f0c040;font-size:14px;font-weight:bold;margin-bottom:8px;text-align:center}
.kb-item{color:#cc8;font-size:12px;margin-bottom:4px}
.r0{color:#aa8}.r1{color:#4a8}.r2{color:#58f}.r3{color:#a4f}.r4{color:#fa4}
#skillScreen{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.82)}
#skillPanel{background:linear-gradient(180deg,#1e1a14,#141210);border:2px solid #5a4a2a;padding:20px;min-width:560px;border-radius:6px}
#skillPanel h2{color:#f0c040;font-size:16px;letter-spacing:3px;margin-bottom:14px;text-align:center;border-bottom:1px solid #3a3020;padding-bottom:8px}
.skill-tree{display:flex;gap:16px}
.skill-branch{flex:1}
.skill-branch h3{color:#cc8;font-size:12px;margin-bottom:8px;text-align:center}
.skill-entry{background:#12100c;border:1px solid #332;padding:6px;margin-bottom:4px;display:flex;align-items:center;gap:8px;cursor:pointer;border-radius:3px}
.skill-entry:hover{border-color:#f0c040}
.skill-entry .sk-icon{font-size:20px;width:28px;text-align:center}
.skill-entry .sk-info{flex:1;font-size:10px;color:#aa8;line-height:1.5}
.skill-entry .sk-name{font-size:11px;font-weight:bold}
.skill-entry .sk-lvl{color:#f0c040;font-size:10px}
.skill-entry .sk-btn{padding:2px 8px;background:#2a2418;border:1px solid #5a4a2a;color:#f0c040;cursor:pointer;font-size:10px;border-radius:2px}
.skill-entry .sk-btn:hover{background:#3a3428}
.skill-entry .sk-btn:disabled{opacity:.3;cursor:default}
#questScreen{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.82)}
#questPanel{background:linear-gradient(180deg,#1e1a14,#141210);border:2px solid #5a4a2a;padding:20px;min-width:400px;max-height:70vh;overflow-y:auto;border-radius:6px}
#questPanel h2{color:#f0c040;font-size:16px;letter-spacing:3px;margin-bottom:14px;text-align:center;border-bottom:1px solid #3a3020;padding-bottom:8px}
.quest-item{background:#12100c;border:1px solid #332;padding:8px;margin-bottom:6px;border-radius:3px;cursor:pointer}
.quest-item:hover{border-color:#f0c040;box-shadow:0 0 14px #f0c0402a;transform:translateY(-1px)}
.quest-item .qi-name{color:#f0c040;font-size:12px;font-weight:bold}
.quest-item .qi-desc{color:#886;font-size:10px;margin:4px 0}
.quest-item .qi-prog{color:#4a8;font-size:10px}
.quest-item .qi-reward{color:#fa4;font-size:10px}
.quest-item .qi-tag{display:inline-block;padding:1px 6px;border:1px solid #665;color:#bba;font-size:9px;border-radius:10px;margin-left:6px}
.quest-item .qi-tag.elite{border-color:#8a6a20;color:#f0c040}
.quest-item .qi-tag.epic{border-color:#7a3fa0;color:#d8a8ff}
.quest-btn{padding:4px 12px;background:#2a2418;border:1px solid #5a4a2a;color:#f0c040;cursor:pointer;font-size:11px;border-radius:2px;margin-top:4px;transition:all .15s}
.quest-btn:hover{background:#3a3428;box-shadow:0 0 10px #f0c04033}
/* Character Select */
#charSelect{display:flex;gap:14px;margin:24px 0 20px;flex-wrap:wrap;justify-content:center}
.char-card{width:130px;background:linear-gradient(180deg,#1a1610,#100e0a);border:2px solid #3a3020;border-radius:8px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.char-card:hover{border-color:#f0c040;transform:translateY(-4px);box-shadow:0 8px 24px rgba(240,192,64,.12)}
.char-card.selected{border-color:#f0c040;background:linear-gradient(180deg,#2a2418,#1a1610);box-shadow:0 0 20px rgba(240,192,64,.15)}
.char-card.selected::after{content:'✦';position:absolute;top:6px;right:8px;color:#f0c040;font-size:12px}
.char-card .cc-sprite{width:48px;height:60px;margin:0 auto 8px;position:relative}
.char-card .cc-name{color:#f0c040;font-size:13px;font-weight:bold;letter-spacing:2px;margin-bottom:4px}
.char-card .cc-title{color:#886;font-size:9px;letter-spacing:1px;margin-bottom:8px}
.char-card .cc-stats{text-align:left;font-size:9px;color:#aa8;line-height:1.8;padding:0 4px}
.char-card .cc-stats .stat-val{color:#cca;float:right}
.char-card .cc-weapon{color:#4a8;font-size:9px;margin-top:6px;padding-top:6px;border-top:1px solid #2a2418}
.char-card .cc-skills{color:#8af;font-size:9px;margin-top:4px;line-height:1.6}
#playBtn{margin-top:0}
#playBtn:disabled{opacity:.3;cursor:default;border-color:#554}

/* 合成界面样式 */
.craft-mat{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid #554;border-radius:4px;background:rgba(20,15,10,.5);cursor:pointer}
.craft-mat:hover{border-color:#f0c040;background:rgba(40,30,20,.5)}
.mat-icon{font-size:18px}
.mat-info{flex:1}
.craft-rec{border:1px solid #554;border-radius:4px;padding:12px;margin-bottom:10px;background:rgba(20,15,10,.5)}
.craft-rec h4{color:#f0c040;margin:0 0 8px 0;letter-spacing:2px}
.rec-mats{margin:8px 0;line-height:1.3}
.craft-btn{margin-top:8px;padding:6px 16px;font-size:12px;background:none;border:1px solid #f0c040;color:#f0c040;cursor:pointer;letter-spacing:2px;font-family:inherit;border-radius:3px}
.craft-btn:hover{background:rgba(240,192,64,.2)}
.craft-btn:disabled{opacity:.5;cursor:default}

</style>
</head>
<body>
<div id="startScreen">
  <canvas id="bgFX" style="position:absolute;inset:0;z-index:-1"></canvas>
  <h1>暗黑要塞</h1>
  <div class="sub">堡垒防守战 · 选择你的英雄</div>
  <div id="charSelect"></div>
  <button id="playBtn" disabled>选择英雄后开始</button>
  <div class="controls">
    WASD 移动 · 鼠标左键 普攻 · 技能键见角色 · E 闪避 · B/I 背包 · K 技能树 · C 合成<br>
    靠近商人/NPC按空格交互 · 野外中立怪可击杀获取金币和装备<br>
    初始武器随击杀数自动进化升级
  </div>
</div>
<div id="deathScreen">
  <h1>要塞沦陷</h1>
  <div class="sub2" id="deathSub"></div>
  <div class="stats" id="deathStats"></div>
  <button id="restartBtn">重新防守</button>
  <button id="reselectBtn" style="margin-top:10px;padding:10px 28px;font-size:14px;background:none;border:1px solid #886;color:#886;cursor:pointer;letter-spacing:3px;font-family:inherit;border-radius:4px">重选英雄</button>
</div>
<div id="victoryScreen" style="position:fixed;inset:0;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,8,0,.94)">
  <h1 style="font-size:56px;color:#f0c040;letter-spacing:8px;margin-bottom:12px;text-shadow:0 0 40px #f0c04088">胜 利</h1>
  <div style="color:#ffd700;font-size:18px;margin-bottom:8px">堡垒保卫战 · 全50波通关!</div>
  <div class="stats" id="victoryStats" style="color:#aa8;font-size:13px;margin-bottom:36px;text-align:center;line-height:2.2"></div>
  <button onclick="document.getElementById('victoryScreen').style.display='none';document.getElementById('startScreen').style.display='flex';gs='start'" style="padding:12px 36px;font-size:16px;background:none;border:2px solid #f0c040;color:#f0c040;cursor:pointer;letter-spacing:4px;font-family:inherit;border-radius:4px">返回主界面</button>
</div>
<!-- 合成界面 -->
<div id="craftScreen" style="position:fixed;inset:0;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,8,0,.94)">
  <div style="background:rgba(30,25,15,.8);border:2px solid #8a7a6a;border-radius:8px;padding:30px;max-width:800px;width:90%;max-height:80vh;overflow-y:auto">
    <h1 style="font-size:32px;color:#f0c040;letter-spacing:6px;margin-bottom:20px;text-align:center">🔨 装备合成</h1>
    <div style="display:flex;gap:20px;flex-wrap:wrap">
      <div style="flex:1;min-width:300px">
        <h3 style="color:#f0c040;letter-spacing:3px;margin-bottom:10px">材料</h3>
        <div id="craftMaterials" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0;"></div>
      </div>
      <div style="flex:1;min-width:300px">
        <h3 style="color:#f0c040;letter-spacing:3px;margin-bottom:10px">配方</h3>
        <div id="craftRecipes" style="max-height:300px;overflow-y:auto;margin:10px 0;"></div>
      </div>
    </div>
    <div style="text-align:center;margin-top:20px">
      <button onclick="closeUI()" style="padding:10px 28px;font-size:14px;background:none;border:1px solid #f0c040;color:#f0c040;cursor:pointer;letter-spacing:3px;font-family:inherit;border-radius:4px">关闭</button>
    </div>
  </div>
</div>
<div id="shopScreen">
  <div id="shopPanel">
    <h2 id="shopTitle">商店</h2>
    <div class="shop-tabs" id="shopTabs"></div>
    <div class="shop-grid" id="shopGrid"></div>
  </div>
</div>
<div id="invScreen">
  <div id="invPanel">
    <div class="inv-left">
      <div class="inv-title">药水</div>
      <div class="inv-grid" id="potionGrid"></div>
      <div class="inv-title" style="margin-top:8px">背 包</div>
      <div class="inv-grid" id="invGrid"></div>
      <div style="color:#665;font-size:9px;text-align:center;margin-bottom:6px">右键点击物品出售</div>
      <div class="inv-stats" id="invStats"></div>
    </div>
    <div class="inv-right">
      <div class="inv-title">装 备</div>
      <div class="equip-grid" id="equipGrid"></div>
      <div class="inv-stats" id="equipStats"></div>
      <div class="inv-title" style="margin-top:8px">套装</div>
      <div class="inv-stats" id="setStats"></div>
    </div>
  </div>
</div>
<div id="skillScreen">
  <div id="skillPanel">
    <h2>技能树 <span id="skillPtsDisplay" style="color:#4f4;font-size:12px"></span></h2>
    <div class="skill-tree" id="skillTree"></div>
  </div>
</div>
<div id="questScreen">
  <div id="questPanel">
    <h2 id="questTitle">NPC</h2>
    <div id="questContent"></div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>
<canvas id="game"></canvas>
<div class="keybindings" id="keybindings">
  <div class="kb-title">按键提示</div>
  <div class="kb-item">WASD/方向键: 移动</div>
  <div class="kb-item">鼠标左键: 攻击</div>
  <div class="kb-item">Q/E/R/F: 技能</div>
  <div class="kb-item">空格键: 与NPC交互</div>
  <div class="kb-item">I: 打开背包</div>
  <div class="kb-item">K: 打开技能树</div>
  <div class="kb-item">C: 打开合成</div>
</div>
<script>
window.onerror=function(m,u,l,c,e){document.title='ERR:L'+l+' '+m;console.error('L'+l+':',m,e&&e.stack)};
// ============================================================
// 暗黑要塞 - 堡垒防守战 v2 ENGINE
// ============================================================
const C=document.getElementById('game'),ctx=C.getContext('2d');
let W,H;function resize(){W=C.width=innerWidth;H=C.height=innerHeight}resize();addEventListener('resize',resize);

// --- CONSTANTS ---
const T=32,MW=120,MH=120,FX=MW/2,FY=MH/2,FR=5;
const RNAMES=['普通','优秀','稀有','史诗','传说'],RC=['#aaaa88','#44aa88','#5588ff','#aa44ff','#ffaa44'];
const ES=['weapon','armor','helmet','boots','ring','amulet'];
const EL={weapon:'武器',armor:'铠甲',helmet:'头盔',boots:'靴子',ring:'戒指',amulet:'项链'};
const SLOT_ICONS={weapon:'⚔',armor:'🛡',helmet:'⛑',boots:'👢',ring:'💍',amulet:'📿',consumable:'🧪'};
const DIRS=[{n:'北方',sx:MW/2,sy:2},{n:'南方',sx:MW/2,sy:MH-2},{n:'西方',sx:2,sy:MH/2},{n:'东方',sx:MW-2,sy:MH/2}];

// --- STATE ---
let gs='start',map=[],player,enemies=[],eProj=[],projectiles=[],particles=[],loot=[],fTexts=[],aoes=[];
let cam={x:0,y:0,sk:0,sx:0,sy:0};
let keys={},mouse={x:0,y:0,down:0,clicked:0,rclick:0};
let kills=0,gTime=0,waveN=0,waveT=0,waveOn=0,nextWD=12;
let waveSpawnT=0,waveSpawnTotal=0,waveSpawnCount=0,waveSpawnDir=null,waveSpawnDiff=1,waveSpawnTypes=[];
let fort={hp:1200,maxHp:1200,x:FX*T,y:FY*T};
let fortNoHitTime=0,fortRegenTick=0;
let shops=[],npcs=[],neutralCamps=[],quests=[],events=[];
let questLineTab='main';
let zoneDropBoost={ice:0,fire:0,thunder:0,earth:0};
let uiOpen=''; // '' | 'shop' | 'inv' | 'skill' | 'quest'

// --- TERRAIN DECORATION SYSTEM ---
let terrainSeed=[];let tileCache=null;let tileCacheDirty=true;
function hashXY(x,y){return((x*374761393+y*668265263)^(x*1274126177))>>>0}
function frac(v){return v-Math.floor(v)}
function noise2D(x,y){return frac(Math.sin(x*12.9898+y*78.233)*43758.5453)}
// Decoration types placed on floor tiles
const DECO_TYPES=[
  {id:'grass1',prob:.12,draw(ctx,x,y,s){ctx.fillStyle='#1a3018';const h=4+s%6;ctx.fillRect(x+3+s%10,y+T-h-1,2,h);ctx.fillRect(x+7+s%8,y+T-h+1,2,h-1);ctx.fillRect(x+12+s%6,y+T-h+2,1,h-2)}},
  {id:'grass2',prob:.10,draw(ctx,x,y,s){ctx.fillStyle='#223a1a';for(let i=0;i<3;i++){const bx=x+4+((s>>i*3)&7)*3,by=y+T-3-((s>>i*2)&3);ctx.fillRect(bx,by,1,3+i)}}},
  {id:'pebble',prob:.07,draw(ctx,x,y,s){ctx.fillStyle='#2a2820';ctx.fillRect(x+6+s%16,y+10+s%12,4,3);ctx.fillStyle='#252318';ctx.fillRect(x+8+s%14,y+18+s%8,3,2)}},

// Pre-render tile textures to offscreen canvas for performance
let bgCanvas=null,bgCtx=null;
function prerenderBG(){
  bgCanvas=document.createElement('canvas');
  bgCanvas.width=MW*T;bgCanvas.height=MH*T;bgCtx=bgCanvas.getContext('2d');
  const bc=bgCtx;
  for(let ty=0;ty<MH;ty++)for(let tx=0;tx<MW;tx++){
    const t=map[ty][tx],px=tx*T,py=ty*T,seed=terrainSeed[ty]?terrainSeed[ty][tx]:0;
    const inF=Math.abs(tx-FX)<FR&&Math.abs(ty-FY)<FR;
    const nearFort=Math.abs(tx-FX)<FR+3&&Math.abs(ty-FY)<FR+3;
    const onRoad=isRoad(tx,ty);
    if(t===0){
      // FLOOR TILES
      if(inF){
        // Interior fortress floor - stone tiles
        const shade=((tx+ty)%2===0)?'#222a20':'#1e2618';
        bc.fillStyle=shade;bc.fillRect(px,py,T,T);
        // Stone grout lines
        bc.fillStyle='#181e14';bc.fillRect(px,py,T,1);bc.fillRect(px,py,1,T);
        // Subtle wear marks
        if(seed%7===0){bc.fillStyle='#2a3228';bc.fillRect(px+4+seed%12,py+4+seed%12,6,4)}
      } else if(onRoad){
        // Road - worn cobblestone
        const v=noise2D(tx*0.8,ty*0.8)*15;
        bc.fillStyle=`rgb(${28+v|0},${26+v|0},${20+v|0})`;bc.fillRect(px,py,T,T);
        // Cobblestone pattern
        bc.strokeStyle='#1a1810';bc.lineWidth=.5;
        bc.strokeRect(px+1,py+1,T/2-1,T/2-1);bc.strokeRect(px+T/2,py+1,T/2-1,T/2-1);
        bc.strokeRect(px+T/4,py+T/2,T/2-1,T/2-1);
        // Wear in center
        if(seed%5===0){bc.fillStyle='rgba(40,35,25,.3)';bc.fillRect(px+8,py+8,T-16,T-16)}
      } else {
        // Outdoor ground - earth/grass with variation
        const v1=noise2D(tx*0.3,ty*0.3),v2=noise2D(tx*0.7+100,ty*0.7+100);
        const r=14+v1*12,g=18+v1*14+v2*4,b=8+v1*8;
        bc.fillStyle=`rgb(${r|0},${g|0},${b|0})`;bc.fillRect(px,py,T,T);
        // Texture noise
        for(let i=0;i<4;i++){
          const nx=px+((seed>>(i*4))&15)*2,ny=py+((seed>>(i*4+2))&15)*2;
          const bright=noise2D(tx*5+i,ty*5+i)*0.08;
          bc.fillStyle=`rgba(${bright>.04?'60,70,30':'10,12,6'},${0.15+bright})`;
          bc.fillRect(nx,ny,2+i%2,2)
        }
        // Edge darkening for depth between tiles
        bc.fillStyle='rgba(0,0,0,.06)';bc.fillRect(px,py,T,1);bc.fillRect(px,py,1,T);
        // Decorations
        const rng=seed/4294967296;
        DECO_TYPES.forEach(d=>{
          const pr=frac(rng*d.prob*1000+d.prob*tx+d.prob*ty*3);
          if(pr<d.prob)d.draw(bc,px,py,seed&255);
        });
      }
    } else if(t===1){
      // WALL TILES - rocky walls with depth
      const v=noise2D(tx*0.5,ty*0.5)*10;
      const base_r=34+v,base_g=32+v,base_b=26+v;
      bc.fillStyle=`rgb(${base_r|0},${base_g|0},${base_b|0})`;bc.fillRect(px,py,T,T);
      // Top face (lighter)
      bc.fillStyle=`rgb(${base_r+18|0},${base_g+16|0},${base_b+12|0})`;bc.fillRect(px,py,T,6);
      // Side shade
      bc.fillStyle='rgba(0,0,0,.15)';bc.fillRect(px,py+T-4,T,4);
      // Stone brick pattern
      bc.strokeStyle='rgba(0,0,0,.2)';bc.lineWidth=1;
      if((ty)%2===0){bc.strokeRect(px+1,py+1,T/2-1,T/2-1);bc.strokeRect(px+T/2,py+1,T/2-1,T/2-1)}
      else{bc.strokeRect(px+T/4,py+1,T/2,T/2-1);bc.strokeRect(px-T/4,py+1,T/2,T/2-1);bc.strokeRect(px+T*3/4,py+1,T/2,T/2-1)}
      // Moss on some walls
      if(seed%11<2){bc.fillStyle='#1a2a14';bc.fillRect(px+seed%8,py+T-6,4+seed%6,3)}
      // Crack detail
      if(seed%13===0){bc.strokeStyle='rgba(0,0,0,.3)';bc.lineWidth=.5;bc.beginPath();bc.moveTo(px+6+seed%10,py+2);bc.lineTo(px+10+seed%8,py+12);bc.lineTo(px+8+seed%6,py+T-4);bc.stroke()}
    } else if(t===2){
      // FORTRESS WALL - polished stone bricks
      const v=noise2D(tx*0.4,ty*0.4)*8;
      bc.fillStyle=`rgb(${52+v|0},${52+v|0},${62+v|0})`;bc.fillRect(px,py,T,T);
      // Brick highlight top
      bc.fillStyle=`rgb(${68+v|0},${68+v|0},${80+v|0})`;bc.fillRect(px,py,T,5);
      // Brick pattern
      bc.strokeStyle='rgba(0,0,0,.25)';bc.lineWidth=1;
      if((ty+tx)%2===0){bc.strokeRect(px+1,py+1,T-2,T/2-1);bc.strokeRect(px+1,py+T/2,T/2-1,T/2-1);bc.strokeRect(px+T/2,py+T/2,T/2-1,T/2-1)}
      else{bc.strokeRect(px+1,py+1,T/2-1,T/2-1);bc.strokeRect(px+T/2,py+1,T/2-1,T/2-1);bc.strokeRect(px+1,py+T/2,T-2,T/2-1)}
      // Glow accent
      if((tx+ty)%4===0){bc.fillStyle='rgba(240,192,64,.06)';bc.fillRect(px+2,py+2,T-4,T-4)}
      // Crenellation effect on outer edge
      if(Math.abs(tx-FX)===FR||Math.abs(ty-FY)===FR){
        bc.fillStyle='rgba(80,80,100,.4)';
        if((tx+ty)%2===0)bc.fillRect(px+4,py-4,T-8,6);
      }
    }
  }
  // Road border/edge stones
  for(let ty=0;ty<MH;ty++)for(let tx=0;tx<MW;tx++){
    if(!isRoad(tx,ty))continue;
    const px=tx*T,py=ty*T;
    // Add border stones where road meets ground
    if(tx>0&&!isRoad(tx-1,ty)&&map[ty][tx-1]===0){bc.fillStyle='#3a362a';bc.fillRect(px,py,2,T)}
    if(tx<MW-1&&!isRoad(tx+1,ty)&&map[ty][tx+1]===0){bc.fillStyle='#3a362a';bc.fillRect(px+T-2,py,2,T)}
    if(ty>0&&!isRoad(tx,ty-1)&&map[ty-1][tx]===0){bc.fillStyle='#3a362a';bc.fillRect(px,py,T,2)}
    if(ty<MH-1&&!isRoad(tx,ty+1)&&map[ty+1][tx]===0){bc.fillStyle='#3a362a';bc.fillRect(px,py+T-2,T,2)}
  }
  // Add ambient shadow around fortress
  const fcx=FX*T+T/2,fcy=FY*T+T/2,frad=(FR+2)*T;
  const grd=bc.createRadialGradient(fcx,fcy,FR*T*.6,fcx,fcy,frad);
  grd.addColorStop(0,'rgba(240,200,80,.03)');grd.addColorStop(.5,'rgba(240,180,60,.015)');grd.addColorStop(1,'rgba(0,0,0,0)');
  bc.fillStyle=grd;bc.fillRect(fcx-frad,fcy-frad,frad*2,frad*2);

  tileCacheDirty=false;
}
// Check if tile is on a road
let roadMap=[];
function isRoad(tx,ty){return roadMap[ty]&&roadMap[ty][tx]===1}
function markRoads(){
  roadMap=[];for(let y=0;y<MH;y++){roadMap[y]=[];for(let x=0;x<MW;x++)roadMap[y][x]=0}
  [[FX,FY-FR,0,-1],[FX,FY+FR,0,1],[FX-FR,FY,-1,0],[FX+FR,FY,1,0]].forEach(([sx,sy,ddx,ddy])=>{
    let cx=sx,cy=sy;for(let s=0;s<40;s++){cx+=ddx;cy+=ddy;if(cx<1||cy<1||cx>=MW-1||cy>=MH-1)break;
    for(let w=-1;w<=1;w++){
      if(ddx===0){ // vertical road
        if(cy>=0&&cy<MH&&cx+w>=0&&cx+w<MW){
          roadMap[cy][cx+w]=1;
        }
      }
      if(ddy===0){ // horizontal road
        if(cy+w>=0&&cy+w<MH&&cx>=0&&cx<MW){
          roadMap[cy+w][cx]=1;
        }
      }
    }}
  });
}

let ac;function initA(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)()}
function snd(t){
  if(!ac)return;const g=ac.createGain(),o=ac.createOscillator();g.connect(ac.destination);o.connect(g);const n=ac.currentTime;
  const S={hit:['square',200,80,.1,.15],swing:['sawtooth',150,300,.08,.08],fire:['sawtooth',400,100,.3,.12],ice:['sine',800,200,.25,.1],slam:['square',80,30,.3,.2],heal:['sine',600,900,.3,.1],zap:['square',1200,100,.15,.12],swords:['sawtooth',300,200,.3,.1],pickup:['sine',500,900,.15,.1],lvl:['sine',400,1000,.5,.15],dash:['triangle',300,600,.1,.1],death:['sawtooth',200,40,.8,.2],wave:['square',100,400,.4,.15],boss:['square',60,200,.6,.2],arrow:['triangle',600,200,.08,.06]}[t];
  if(!S)return;o.type=S[0];o.frequency.setValueAtTime(S[1],n);o.frequency.exponentialRampToValueAtTime(Math.max(S[2],1),n+S[3]);
  g.gain.setValueAtTime(S[4],n);g.gain.exponentialRampToValueAtTime(.001,n+S[3]+.05);o.start(n);o.stop(n+S[3]+.1);
}

function tAt(px,py){const tx=Math.floor(px/T),ty=Math.floor(py/T);if(tx<0||ty<0||tx>=MW||ty>=MH)return 1;return map[ty][tx]}
function blk(x,y,w,h){const c=v=>v===1;return c(tAt(x-w/2,y-h/2))||c(tAt(x+w/2,y-h/2))||c(tAt(x-w/2,y+h/2))||c(tAt(x+w/2,y+h/2))}
function dst(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

// Class passive: ranger dodge, mage mana shield, warrior damage reduction, paladin block
function hurtP(rawDmg,invulnTime){
  if(player.invuln>0)return;
  let dmg=Math.max(1,rawDmg-getDef()+~~(Math.random()*3));
  // Ranger: 15% dodge chance
  if(player.classId==='ranger'&&Math.random()<.15){addFT(player.x,player.y-24,'闪避!','#4f4');pburst(player.x,player.y,'#4f4',5,50,.3);return}
  // Warrior: 10% flat damage reduction
  if(player.classId==='warrior')dmg=Math.max(1,~~(dmg*.9));
  // Mage: absorb 30% from mana (costs mana*0.5)
  if(player.classId==='mage'&&player.mana>10){const absorb=~~(dmg*.3);const manaCost=~~(absorb*.5);player.mana=Math.max(0,player.mana-manaCost);dmg-=absorb;
    if(absorb>0)addFT(player.x+15,player.y-18,'-'+manaCost+'法力护盾','#88f')}


  if(dmg<=0)return;
  dmg=Math.max(1,dmg);
  player.hp-=dmg;player.flashT=.12;player.invuln=invulnTime||.3;
  addFT(player.x,player.y-20,'-'+dmg,'#f44');cam.sk=.1;snd('hit');
  if(player.hp<=0)die();
}

// --- CRAFTING FUNCTIONS ---
function openCraft(){uiOpen='craft';document.getElementById('craftScreen').style.display='flex';renderCraft()}

function renderCraft(){const matEl=document.getElementById('craftMaterials'),recEl=document.getElementById('craftRecipes');matEl.innerHTML='';recEl.innerHTML='';
  // Render materials
  for(const[mid,mat]of Object.entries(CRAFT_MATERIALS)){
    const cnt=player.materials.filter(i=>i.id===mid).reduce((a,b)=>a+(b.qty||1),0);
    const div=document.createElement('div');div.className='craft-mat';
    div.innerHTML=`<div class="mat-icon">${mat.icon}</div><div class="mat-info"><div style="font-size:16px;font-weight:bold;color:#fff">${mat.name}</div><div style="font-size:14px;color:#cc8">${cnt}个</div></div>`;
    div.title=mat.desc;matEl.appendChild(div);
  }
  // Render recipes
  for(const[rid,rec]of Object.entries(CRAFT_RECIPES)){
    // Filter by class if recipe is class-specific
    if(rec.class&&rec.class!==player.classId)continue;
    const canCraft=checkCraftMaterials(rec.materials);
    const div=document.createElement('div');div.className='craft-rec';
    if(canCraft)div.style.borderColor='#4f4';
    div.innerHTML=`<h4>${rec.name}</h4>`;
    const matList=document.createElement('div');matList.className='rec-mats';
    for(const[mid,amt]of Object.entries(rec.materials)){
      const cnt=player.materials.filter(i=>i.id===mid).reduce((a,b)=>a+(b.qty||1),0);
      const mat=CRAFT_MATERIALS[mid];
      matList.innerHTML+=`<div style="font-size:16px;color:#cc8">${mat.icon} ${mat.name}: ${cnt}/${amt}</div>`;
    }
    div.appendChild(matList);
    const btn=document.createElement('button');btn.className='craft-btn';
    btn.textContent=canCraft?'合成':'材料不足';btn.disabled=!canCraft;
    btn.onclick=()=>{if(canCraft)craftRecipe(rid)};
    div.appendChild(btn);recEl.appendChild(div);
  }
}

function checkCraftMaterials(mats){for(const[mid,amt]of Object.entries(mats)){
  const cnt=player.materials.filter(i=>i.id===mid).reduce((a,b)=>a+(b.qty||1),0);
  if(cnt<amt)return false;
}return true;}

function craftRecipe(rid){const rec=CRAFT_RECIPES[rid];if(!rec)return;
  if(!checkCraftMaterials(rec.materials)){addFT(player.x,player.y-20,'材料不足','#f44');return}
  // Consume materials
  for(const[mid,amt]of Object.entries(rec.materials)){
    let remaining=amt;
    for(let i=player.materials.length-1;i>=0&&remaining>0;i--){if(player.materials[i].id===mid){
      if(player.materials[i].qty>remaining){player.materials[i].qty-=remaining;remaining=0;}else{
        remaining-=player.materials[i].qty;player.materials.splice(i,1);
      }
    }}
  }
  // Add crafted items
  for(const[slot,item]of Object.entries(rec.result.items)){
    const newItem={...item,type:'equip',id:Date.now()+'_'+slot};
    addToInv(newItem);
  }
  addFT(player.x,player.y-20,'合成成功!','#4f4',true);snd('pickup');
  renderCraft();renderInv();
}

function addMaterial(id,qty=1){const mat=CRAFT_MATERIALS[id];if(!mat)return;
  const existing=player.materials.find(i=>i.id===id);
  if(existing){existing.qty=(existing.qty||1)+qty;}else{
    player.materials.push({...mat,id,type:'material',qty});
  }
}

function getSetBonuses(){
  const active = {};
  for(const [sid, s] of Object.entries(SETS)) {
    let count = 0;
    for(const sl of s.slots) {
      if(player.equip[sl]?.set === sid) {
        count++;
      }
    }
    if(count >= 2) {
      active[sid] = {count, set: s};
    }
  }
  return active;
}
function getSetStat(stat){
  let v = 0;
  const sb = getSetBonuses();
  for(const [sid, {count, set}] of Object.entries(sb)) {
    if(count >= 2 && set.bonus2[stat]) {
      v += set.bonus2[stat];
    }
    if(count >= 3 && set.bonus3[stat]) {
      v += set.bonus3[stat];
    }
  }
  return v;
}

// --- STAT HELPERS ---
function getAtk(){let a=player.bAtk;for(const s of ES)if(player.equip[s]?.atk)a+=player.equip[s].atk;for(const b of player.buffs)if(b.t==='atk')a+=b.v;return a+getSetStat('atk')+(player.tempAtkBoost||0)+(player.tempAtk||0)}
function getDef(){let d=player.bDef;for(const s of ES)if(player.equip[s]?.def)d+=player.equip[s].def;return d+getSetStat('def')+(player.tempDefBoost||0)+(player.tempDef||0)}
function getCrit(){let c=player.critR;for(const s of ES)if(player.equip[s]?.crit)c+=player.equip[s].crit;return c+getSetStat('crit')+(player.tempCrit||0)}
function getCritD(){let c=player.critD;for(const s of ES)if(player.equip[s]?.critDmg)c+=player.equip[s].critDmg;return c}
function getLS(){let l=0;for(const s of ES)if(player.equip[s]?.lifeSteal)l+=player.equip[s].lifeSteal;return l+getSetStat('lifeSteal')+(player.tempLifeSteal||0)}
function getSpd(){let s=player.speed;for(const sl of ES)if(player.equip[sl]?.speed)s+=player.equip[sl].speed;return s+(player.tempSpeedBoost||0)+(player.tempSpeed||0)}

// Evolving weapon system - check after each kill
function checkTalentUpgrade(){
  // Calculate talent level based on kills
  const newTalentLevel=Math.floor(kills/20); // 20 kills per talent level
  if(newTalentLevel<=player.talentLevel)return;
  
  // Gain talent points
  const talentPointsGained=newTalentLevel-player.talentLevel;
  player.talentPoints+=talentPointsGained;
  player.talentLevel=newTalentLevel;
  
  // Show upgrade message
  addFT(player.x,player.y-50,'天赋升级!','#ffd040',true);
  addFT(player.x,player.y-30,'获得 '+talentPointsGained+' 点天赋点!','#ffd040',true);
  pburst(player.x,player.y,'#ffd040',25,120,.6);
  snd('lvl');
  
  // Apply talent effects
  applyTalentEffects();
}

function applyTalentEffects(){
  // Reset temporary stats
  player.tempAtk=0;
  player.tempDef=0;
  player.tempCrit=0;
  player.tempSpeed=0;
  player.tempMaxHp=0;
  player.tempMaxMana=0;
  
  // Get class talents
  const cl=CLASSES[player.classId];
  if(!cl||!cl.talents)return;
  
  // Apply talent effects based on talent level
  const talentLevel=player.talentLevel;
  
  // Example: Apply different effects based on talent level
  // This is a simplified implementation, you can expand it based on your needs
  if(talentLevel>=1){
    // Level 1: Basic stat boost
    player.tempAtk+=5;
    player.tempDef+=2;
  }
  if(talentLevel>=2){
    // Level 2: Enhanced abilities
    player.tempCrit+=0.05;
    player.tempSpeed+=10;
  }
  if(talentLevel>=3){
    // Level 3: Advanced effects
    player.tempMaxHp+=50;
    player.tempMaxMana+=30;
  }
  if(talentLevel>=4){
    // Level 4: Powerful bonuses
    player.tempAtk+=10;
    player.tempDef+=5;
  }
  if(talentLevel>=5){
    // Level 5: Ultimate power
    player.tempCrit+=0.1;
    player.tempSpeed+=20;
  }
}
function skCd(id){const d=findSkillDef(id);if(!d)return 99;const lv=skLv(id);return Math.max(.5,d.baseCd+d.cdPerLv*lv)}
function skDmg(id){const d=findSkillDef(id);if(!d)return 0;const lv=skLv(id);let dmg=d.baseDmg+d.dmgPerLv*lv;if((id==='q'||id==='storm')&&getSetStat('fireMult'))dmg*=(1+getSetStat('fireMult'));return Math.floor(dmg)}
function skMana(id){const d=findSkillDef(id);return d?d.mana:99}
function findSkillDef(id){for(const b of Object.values(SKILL_TREE))if(b.skills[id])return b.skills[id];return null}

// --- MAP GEN ---
function genMap(){
  map=[];for(let y=0;y<MH;y++){map[y]=[];for(let x=0;x<MW;x++)map[y][x]=0}
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++){if(x===0||y===0||x===MW-1||y===MH-1)map[y][x]=1}
  // Fortress walls
  for(let dy=-FR;dy<=FR;dy++)for(let dx=-FR;dx<=FR;dx++){
    const d=Math.sqrt(dx*dx+dy*dy);if(d>=FR-.5&&d<=FR+.5)map[FY+dy][FX+dx]=2;
  }
  // 4 gates
  for(let i=-1;i<=1;i++){map[FY-FR][FX+i]=0;map[FY+FR][FX+i]=0;map[FY+i][FX-FR]=0;map[FY+i][FX+FR]=0}
  // Obstacles
  for(let i=0;i<90;i++){const ox=5+~~(Math.random()*(MW-10)),oy=5+~~(Math.random()*(MH-10));if(Math.abs(ox-FX)<FR+4&&Math.abs(oy-FY)<FR+4)continue;map[oy][ox]=1;if(Math.random()>.5&&ox+1<MW-1)map[oy][ox+1]=1}
  // Create walled roads with 7-tile wide center path
  [[FX,FY-FR,0,-1],[FX,FY+FR,0,1],[FX-FR,FY,-1,0],[FX+FR,FY,1,0]].forEach(([sx,sy,ddx,ddy])=>{
    let cx=sx,cy=sy;for(let s=0;s<40;s++){cx+=ddx;cy+=ddy;if(cx<1||cy<1||cx>=MW-1||cy>=MH-1)break;
    // For vertical roads (north-south), create walls on left and right, keep 7-tile center open
    if(ddx===0){ // vertical
      if(map[cy]){
        map[cy][cx-3]=1; // left outer wall
        map[cy][cx-2]=0; // left path
        map[cy][cx-1]=0; // left center path
        map[cy][cx]=0;   // center path
        map[cy][cx+1]=0; // right center path
        map[cy][cx+2]=0; // right path
        map[cy][cx+3]=1; // right outer wall
      }
    }
    // For horizontal roads (east-west), create walls on top and bottom, keep 7-tile center open
    if(ddy===0){ // horizontal
      if(map[cy-3])map[cy-3][cx]=1; // top outer wall
      if(map[cy-2])map[cy-2][cx]=0; // top path
      if(map[cy-1])map[cy-1][cx]=0; // top center path
      if(map[cy])map[cy][cx]=0;     // center path
      if(map[cy+1])map[cy+1][cx]=0; // bottom center path
      if(map[cy+2])map[cy+2][cx]=0; // bottom path
      if(map[cy+3])map[cy+3][cx]=1; // bottom outer wall
    }
    }
  });
  // Keep spawn outlets open: no walls/obstacles near map-edge entrances
  DIRS.forEach(d=>{
    const ox=~~d.sx,oy=~~d.sy;
    for(let dy=-4;dy<=4;dy++)for(let dx=-4;dx<=4;dx++){
      const xx=ox+dx,yy=oy+dy;
      if(xx>1&&yy>1&&xx<MW-1&&yy<MH-1)map[yy][xx]=0;
    }
  });
  // Shops
  shops=[
    {x:(FX-3)*T,y:(FY-3)*T,name:'武器铺',icon:'⚔',type:'weapon',color:'#cc4444'},
    {x:(FX+3)*T,y:(FY-3)*T,name:'防具店',icon:'🛡',type:'armor',color:'#4488cc'},
    {x:(FX-3)*T,y:(FY+3)*T,name:'药水商',icon:'🧪',type:'potion',color:'#44aa88'},
    {x:(FX+3)*T,y:(FY+3)*T,name:'饰品商',icon:'💍',type:'acc',color:'#aa44ff'}
  ];
  // Quest NPCs inside fortress
  npcs=[
    {x:(FX-9)*T,y:(FY-8)*T,name:'赏金猎人',icon:'❗',color:'#ffaa44',type:'bounty'},
    {x:(FX+9)*T,y:(FY+8)*T,name:'铁匠大师',icon:'🔨',color:'#4488cc',type:'smith'}
  ];
  // Neutral camps (12 locations: corners, midpoints, wild zones)
  neutralCamps=[];
  const cpos=[
    [FX-25,FY-25], // 西北角落
    [FX+25,FY-25], // 东北角落
    [FX-25,FY+25], // 西南角落
    [FX+25,FY+25], // 东南角落
    [FX+12, FY-30], // 正北（移至道路右侧）
    [FX-12, FY+30], // 正南（移至道路左侧）
    [FX-30, FY-12], // 正西（移至道路上侧）
    [FX+30, FY+12], // 正东（移至道路下侧）
    [FX-10, FY-46], // 北野区（避开中轴道路）
    [FX+10, FY+46], // 南野区（避开中轴道路）
    [FX-46, FY+10], // 西野区（避开中轴道路）
    [FX+46, FY-10]  // 东野区（避开中轴道路）
  ];
  cpos.forEach(([cx,cy],idx)=>{
    // Clear area
    for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++){if(cy+dy>0&&cy+dy<MH-1&&cx+dx>0&&cx+dx<MW-1)map[cy+dy][cx+dx]=0}
    const biome=idx>=8?'wild':(idx<4?'sacred':'frontier');
    const element=idx===8?'ice':idx===9?'fire':idx===10?'thunder':idx===11?'earth':null;
    neutralCamps.push({x:cx*T,y:cy*T,enemies:[],respawnT:0,dead:false,id:idx,biome,element});
  });
  
  // Add new terrain features
  // Forest areas
  for(let i=0;i<50;i++){
    const fx=10+~~(Math.random()*(MW-20));
    const fy=10+~~(Math.random()*(MH-20));
    if(Math.abs(fx-FX)<FR+8&&Math.abs(fy-FY)<FR+8)continue;
    if(Math.abs(fx-FX)<20&&Math.abs(fy-FY)<20)continue;
    map[fy][fx]=3; // Forest terrain
  }
  
  // Water areas
  for(let i=0;i<30;i++){
    const wx=15+~~(Math.random()*(MW-30));
    const wy=15+~~(Math.random()*(MH-30));
    if(Math.abs(wx-FX)<FR+10&&Math.abs(wy-FY)<FR+10)continue;
    if(Math.abs(wx-FX)<25&&Math.abs(wy-FY)<25)continue;
    map[wy][wx]=4; // Water terrain
  }
  
  // Add new NPCs and shops
  // Additional quest NPC
  npcs.push({x:(FX-30)*T,y:FY*T,name:'神秘商人',icon:'🔮',color:'#8844ff',type:'merchant'});
  npcs.push({x:(FX+30)*T,y:FY*T,name:'药剂师',icon:'⚗',color:'#44ffaa',type:'alchemist'});
  
  // Additional shops
  shops.push({x:(FX-40)*T,y:FY*T,name:'卷轴店',icon:'📜',type:'scroll',color:'#ff8844'});
  shops.push({x:(FX+40)*T,y:FY*T,name:'宝石商',icon:'💎',type:'gem',color:'#ff44ff'});
}

function createPlayer(){

  const p={x:FX*T,y:FY*T,w:18,h:18,speed:cl.baseSpd,hp:cl.baseHp,maxHp:cl.baseHp,mana:cl.baseMana,maxMana:cl.baseMana,

  // Apply starting skills
  for(const[skId,lv] of Object.entries(cl.startSkills)){p.skillLvs[skId]=lv}
  // Starting weapon (evolvable)
  const evo=cl.weapon.evolve[0];
  const startW={name:evo.name,slot:'weapon',icon:cl.weapon.icon,rarity:evo.rarity,
    atk:evo.atk||0,def:evo.def||0,crit:evo.crit||0,lifeSteal:evo.lifeSteal||0,critDmg:evo.critDmg||0,speed:evo.speed||0,

  p.equip.weapon=startW;

function updateEvents(dt){events.forEach(event=>{const eventType=EVENT_TYPES.find(e=>e.id===event.type);if(eventType)eventType.onUpdate(event,dt);});}

function drawEvents(){events.forEach(event=>{ctx.save();ctx.translate(event.x,event.y);if(event.type==='treasure_chest'){ctx.fillStyle='#8b4513';ctx.fillRect(-15,-15,30,30);ctx.fillStyle='#d4af37';ctx.fillRect(-10,-10,20,20);}else if(event.type==='healing_spring'){ctx.fillStyle='#44aacc';ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.fill();ctx.fillStyle='#88ddff';ctx.beginPath();ctx.arc(0,0,15,0,Math.PI*2);ctx.fill();}ctx.restore();});}

function checkEventInteraction(){events.forEach(event=>{if(dst(player,event)<50){const eventType=EVENT_TYPES.find(e=>e.id===event.type);if(eventType)eventType.onInteract(event);}});}

  neutralCamps.forEach((c,idx)=>{

    const sacredBeasts=[
      {name:'青龙',type:'qinglong',hp:15000,spd:60,atk:400,size:25,color:'#44cc44',xp:10000,gold:4000},

const WE={1:['slime'],2:['slime','wolf'],3:['slime','wolf','archer'],4:['wolf','skeleton','archer'],5:['skeleton','ghost','mage'],6:['skeleton','demon','archer'],7:['demon','ghost','mage'],8:['demon','mage','archer','skeleton'],9:['demon','mage','archer','goblin'],10:['demon','ogre','spider','gargoyle']};
function spawnWave(){
  waveN++;const isBoss=waveN%5===0;
  waveSpawnDir=DIRS[~~(Math.random()*4)];
  waveSpawnTotal=isBoss?1:Math.min(15+~~(waveN*2.5),60);
  waveSpawnDiff=1+waveN*.15;
  waveSpawnTypes=WE[Math.min(10,Math.ceil(waveN/2))]||['demon','ogre','spider','gargoyle'];
  waveSpawnCount=0;waveSpawnT=0;
  addFT(player.x,player.y-40,'=== 第 '+waveN+' 波 ===','#f0c040',true);
  addFT(player.x,player.y-20,'敌人从'+waveSpawnDir.n+'来袭!','#fa8');
  snd(isBoss?'boss':'wave');
  waveOn=1;nextWD=isBoss?28:Math.max(12,25-waveN*.4);
}
function spawnEnemyInWave(){
  const isBoss=waveN%5===0;
  let type;
  if(isBoss){
    // 每5关一个不同的boss，共14个boss循环
    const bossIndex=Math.floor((waveN-1)/5)%14+1;
    type='boss'+bossIndex;
  }else{
    type=waveSpawnTypes[~~(Math.random()*waveSpawnTypes.length)];
  }
  const dir=waveSpawnDir;
  // Spawn enemies at the map edges, far from the fortress
  let sx,sy;
  if(dir.sx===MW/2){ // vertical road (north/south)
    // Spawn at the edge of the map, not in the center
    sx=dir.sx*T+T/2; // center of middle tile
    sy=dir.sy*T;
    // Ensure spawn position is on the road
    sy=Math.max(2*T, Math.min((MH-2)*T, sy));
  }else{ // horizontal road (east/west)
    sx=dir.sx*T;
    sy=dir.sy*T+T/2; // center of middle tile
    // Ensure spawn position is on the road
    sx=Math.max(2*T, Math.min((MW-2)*T, sx));
  }
  // Add slight random offset within the road to prevent perfect stacking
  if(dir.sx===MW/2){ // vertical road
    sx+=(Math.random()-.5)*T*3; // 3 tiles wide
  }else{ // horizontal road
    sy+=(Math.random()-.5)*T*3; // 3 tiles wide
  }
  enemies.push(createWaveEnemy(type,sx,sy,waveSpawnDiff));
  waveSpawnCount++;
}

function openNPC(npc){
  toggleUI('quest');document.getElementById('questTitle').textContent=npc.name;
  const con=document.getElementById('questContent');con.innerHTML='';
  const npcQuests=quests.filter(q=>q.npc===npc.type&&(q.line||'main')===questLineTab);
  const tabs=document.createElement('div');
  tabs.style.display='flex';tabs.style.gap='6px';tabs.style.marginBottom='8px';
  [['main','主线'],['side','支线']].forEach(([id,label])=>{
    const b=document.createElement('button');b.className='quest-btn';b.textContent=label;
    if(questLineTab===id){b.style.borderColor='#f0c040';b.style.color='#fff2b0';}
    b.onclick=()=>{questLineTab=id;openNPC(npc)};
    tabs.appendChild(b);
  });
  con.appendChild(tabs);
  if(!npcQuests.length){const empty=document.createElement('div');empty.style.color='#886';empty.style.textAlign='center';empty.textContent='暂无任务';con.appendChild(empty);return}
  npcQuests.sort((a,b)=>{
    if((a.accepted&&!a.done)!==(b.accepted&&!b.done))return (b.accepted&&!b.done)-(a.accepted&&!a.done);
    return (b.priority||0)-(a.priority||0);
  }).forEach(q=>{
    const el=document.createElement('div');el.className='quest-item';
    const canComplete=q.accepted&&q.prog>=q.need&&!q.done;
    const tier=q.tier||'normal';
    const tierLabel=tier==='epic'?'史诗':tier==='elite'?'精英':'普通';
    const tierClass=tier==='epic'?'epic':tier==='elite'?'elite':'';
    const rewardTxt=['💰'+q.reward.gold,q.reward.xp?('⭐'+q.reward.xp+'经验'):'',q.reward.item?'🎁装备图纸':'' ].filter(Boolean).join(' · ');
    el.innerHTML=`<div class="qi-name">${q.done?'✅ ':''}${q.name}<span class="qi-tag ${tierClass}">${tierLabel}</span></div><div class="qi-desc">${q.desc}</div>
      <div class="qi-prog">${q.accepted?'进度: '+q.prog+'/'+q.need:'状态: 未接取'}</div>
      <div class="qi-reward">奖励: ${rewardTxt}</div>`;
    if(!q.accepted&&!q.done){const btn=document.createElement('button');btn.className='quest-btn';btn.textContent='接受任务';btn.onclick=()=>{q.accepted=true;q.prog=player.questData[q.type==='kill'?'kills':q.type==='bossKill'?'bossKills':'materials']||0;q.tracked=true;quests.forEach(x=>{if(x!==q&&x.accepted&&!x.done&&x.priority<=q.priority)x.tracked=false});addFT(player.x,player.y-20,'接受: '+q.name,'#f0c040');openNPC(npc)};el.appendChild(btn)}
    if(q.accepted&&!q.done){const tr=document.createElement('button');tr.className='quest-btn';tr.textContent=q.tracked?'已追踪':'设为追踪';tr.style.marginLeft='6px';tr.onclick=()=>{quests.forEach(x=>x.tracked=false);q.tracked=true;openNPC(npc)};el.appendChild(tr)}

function useItem(idx){
  const it=player.inventory[idx];if(!it)return;
  if(it.type==='consumable'){
    if(it.effect==='hp')player.hp=Math.min(player.maxHp,player.hp+it.value);
    if(it.effect==='mana')player.mana=Math.min(player.maxMana,player.mana+it.value);
    if(it.effect==='both'){player.hp=Math.min(player.maxHp,player.hp+it.value);player.mana=Math.min(player.maxMana,player.mana+it.value)}
    if(it.effect==='buff_atk'){player.buffs.push({t:'atk',v:it.value,time:20});addFT(player.x,player.y-20,'攻击+'+it.value+'!','#f84',true)}
    snd('pickup');if(it.qty>1)it.qty--;else player.inventory.splice(idx,1);
  }else if(it.type==='equip'){
    // Show equipment action menu
    const menu=document.createElement('div');
    menu.style.position='fixed';
    menu.style.left=mouse.x+'px';
    menu.style.top=mouse.y+'px';
    menu.style.background='#1a1610';
    menu.style.border='1px solid #5a4a2a';
    menu.style.borderRadius='4px';
    menu.style.padding='8px';
    menu.style.zIndex='300';
    menu.style.boxShadow='0 4px 16px rgba(0,0,0,.8)';
    
    const equipBtn=document.createElement('div');
    equipBtn.textContent='装备';
    equipBtn.style.padding='6px 12px';
    equipBtn.style.color='#f0c040';
    equipBtn.style.cursor='pointer';
    equipBtn.style.borderBottom='1px solid #3a3020';
    equipBtn.style.marginBottom='4px';
    equipBtn.onclick=()=>{
      const s=it.slot;if(player.equip[s])addToInv({...player.equip[s]});player.equip[s]=it;player.inventory.splice(idx,1);snd('pickup');
      document.body.removeChild(menu);
      renderInv();
    };
    
    const sellBtn=document.createElement('div');
    const sp=sellPrice(it);
    sellBtn.textContent='出售 - 💰'+sp;
    sellBtn.style.padding='6px 12px';
    sellBtn.style.color='#4a8';
    sellBtn.style.cursor='pointer';
    sellBtn.onclick=()=>{
      if(!it.isStartWeapon){
        player.gold+=sp;
        if(it.qty>1)it.qty--;else player.inventory.splice(idx,1);
        addFT(player.x,player.y-20,'出售获得: 💰'+sp,'#4a8',true);
        snd('pickup');
      }
      document.body.removeChild(menu);
      renderInv();
    };
    
    menu.appendChild(equipBtn);
    menu.appendChild(sellBtn);
    document.body.appendChild(menu);
    
    // Close menu when clicking elsewhere
    setTimeout(()=>{
      document.addEventListener('click',function closeMenu(e){
        if(!menu.contains(e.target)){
          if(document.body.contains(menu)){
            document.body.removeChild(menu);
          }
          document.removeEventListener('click',closeMenu);
        }
      });
    },0);
  }
  hideTT();
}
function unequip(s){if(!player.equip[s])return;if(player.inventory.length>=24){addFT(player.x,player.y-20,'背包已满!','#f44');return}addToInv({...player.equip[s]});player.equip[s]=null;snd('pickup');hideTT()}
function addToInv(item){if(item.type==='material'){
    // Add to materials array
    const ex=player.materials.find(i=>i.id===item.id);
    if(ex){
      ex.qty=(ex.qty||1)+1;
    }else{
      player.materials.push({...item,qty:1});
    }
  }else if(item.type==='consumable'){
    // Add to inventory as before
    const ex=player.inventory.find(i=>i.name===item.name);
    if(ex){
      ex.qty=(ex.qty||1)+1;
      return;
    }
    if(player.inventory.length<24)player.inventory.push({...item,qty:1});
  }else{
    // Other items (equipment) go to inventory
    const fixedIcon=item.icon||SLOT_ICONS[item.slot]||'❖';
    if(player.inventory.length<24)player.inventory.push({...item,icon:fixedIcon,qty:1});
  }
}
function sellPrice(it){if(!it)return 0;if(it.isStartWeapon)return 0;if(it.cost)return~~(it.cost*.4);if(it.type==='consumable')return[3,8,20,50,100][it.rarity]||3;return[5,15,40,100,250][it.rarity]+(it.atk||0)*2+(it.def||0)*2+(it.crit?20:0)+(it.lifeSteal?30:0)}
function sellItem(idx){const it=player.inventory[idx];if(!it)return;const sp=sellPrice(it);if(sp<=0){addFT(player.x,player.y-20,'无法出售','#f44');return}player.gold+=sp;addFT(player.x,player.y-20,'+'+sp+'💰','#ff0');snd('pickup');if(it.qty>1)it.qty--;else player.inventory.splice(idx,1);renderInv()}
function quickUse(n){const pots=player.inventory.filter(i=>i.type==='consumable');if(pots[n-1])useItem(player.inventory.indexOf(pots[n-1]))}

function renderSkillTree(){
  const tree=document.getElementById('skillTree');tree.innerHTML='';
  document.getElementById('skillPtsDisplay').textContent='(可用点数: '+player.skillPts+')';
  const cl=player.classData||CLASSES[player.classId];
  const availIds=cl?cl.availSkills:null;
  
  // Show class-specific skills first
  if(player.classId&&SKILL_TREE[player.classId]){
    const classBranch=SKILL_TREE[player.classId];
    const div=document.createElement('div');div.className='skill-branch';
    div.innerHTML=`<h3>${classBranch.name}</h3>`;
    let hasAny=false;
    for(const[sid,sk]of Object.entries(classBranch.skills)){
      if(availIds&&!availIds.includes(sid))continue;
      hasAny=true;
      const lv=skLv(sid);const canUp=player.skillPts>0&&lv<sk.maxLv;
      const entry=document.createElement('div');entry.className='skill-entry';
      if(lv>0)entry.style.borderColor='#5a4a2a';
      entry.innerHTML=`<div class="sk-icon">${sk.icon}</div><div class="sk-info"><div class="sk-name" style="color:${lv>0?'#f0c040':'#665'}">${sk.name} [${sk.key.toUpperCase()}]</div><div class="sk-lvl">Lv.${lv}/${sk.maxLv}</div><div style="color:#776;font-size:9px">${sk.desc} | CD:${skCd(sid).toFixed(1)}s | 伤害:${skDmg(sid)}</div></div>`;
      const btn=document.createElement('button');btn.className='sk-btn';btn.textContent=lv===0?'学习':'升级';btn.disabled=!canUp;
      btn.onclick=()=>{if(!canUp)return;player.skillLvs[sid]=(player.skillLvs[sid]||0)+1;player.skillPts--;snd('pickup');renderSkillTree()};
      entry.appendChild(btn);div.appendChild(entry);
    }
    if(hasAny)tree.appendChild(div);
  }
  
  // Show common skills
  if(SKILL_TREE.common){
    const commonBranch=SKILL_TREE.common;
    const div=document.createElement('div');div.className='skill-branch';
    div.innerHTML=`<h3>${commonBranch.name}</h3>`;
    let hasAny=false;
    for(const[sid,sk]of Object.entries(commonBranch.skills)){
      if(availIds&&!availIds.includes(sid))continue;
      hasAny=true;
      const lv=skLv(sid);const canUp=player.skillPts>0&&lv<sk.maxLv;
      const entry=document.createElement('div');entry.className='skill-entry';
      if(lv>0)entry.style.borderColor='#5a4a2a';
      entry.innerHTML=`<div class="sk-icon">${sk.icon}</div><div class="sk-info"><div class="sk-name" style="color:${lv>0?'#f0c040':'#665'}">${sk.name} [${sk.key.toUpperCase()}]</div><div class="sk-lvl">Lv.${lv}/${sk.maxLv}</div><div style="color:#776;font-size:9px">${sk.desc} | CD:${skCd(sid).toFixed(1)}s | 伤害:${skDmg(sid)}</div></div>`;
      const btn=document.createElement('button');btn.className='sk-btn';btn.textContent=lv===0?'学习':'升级';btn.disabled=!canUp;
      btn.onclick=()=>{if(!canUp)return;player.skillLvs[sid]=(player.skillLvs[sid]||0)+1;player.skillPts--;snd('pickup');renderSkillTree()};
      entry.appendChild(btn);div.appendChild(entry);
    }
    if(hasAny)tree.appendChild(div);
  }
}

function dropLoot(x,y,gold,isBoss,e){
  player.gold+=gold;addFT(x,y-6,'+'+gold+' 金','#fd0');
  if(Math.random()>(isBoss?.05:.65))return;
  const roll=Math.random();let maxR=isBoss?(roll<.3?3:roll<.6?4:2):(roll<.4?0:roll<.7?1:roll<.9?2:3);
  const pool=DT.filter(l=>l.rarity===maxR);if(!pool.length)return;
  const it=pool[~~(Math.random()*pool.length)];
  loot.push({...it,x:x+(Math.random()-.5)*20,y:y+(Math.random()-.5)*20,bobT:Math.random()*6.28});
  if(isBoss&&Math.random()<.5){const p2=DT.filter(l=>l.rarity>=2);if(p2.length)loot.push({...p2[~~(Math.random()*p2.length)],x:x+(Math.random()-.5)*30,y:y+(Math.random()-.5)*30,bobT:Math.random()*6.28})}
  if(e&&e.neutral){
    const camp=findCampOf(e);
    if(camp&&camp.element){
      const boost=zoneDropBoost[camp.element]||0;
      const chance=.32+boost*.02;
      const pick=Math.random();
      if(pick<chance){
        const matByElem={
          ice:['crystal','cloth'],
          fire:['fireEssence','ironIngot'],
          thunder:['silverIngot','crystal'],
          earth:['ironIngot','leather']
        };
        const pool2=matByElem[camp.element]||['ironIngot'];
        const mid=pool2[~~(Math.random()*pool2.length)];
        addMaterial(mid,1+Math.random()<.35?1:0);
        addFT(x,y-20,'元素掉落+',camp.element==='ice'?'#9ef':camp.element==='fire'?'#f84':camp.element==='thunder'?'#ee8':'#cb9');
      }
    }
  }
}

// === DAMAGE ===
function calcDmg(base){let d=base+getAtk()+~~(Math.random()*4);let c=false;if(Math.random()<getCrit()){d=~~(d*getCritD());c=true}return{d,c}}
function dmgE(e,baseDmg,noCrit){
  let dmg,cr=false;if(noCrit)dmg=baseDmg;else{const r=calcDmg(baseDmg);dmg=r.d;cr=r.c}
  e.hp-=dmg;e.flashT=.12;const a=Math.atan2(e.y-player.y,e.x-player.x);
  // No knockback for bosses and sacred beasts
  if(e.ai!=='boss'&&!['qinglong','baihu','zhuque','xuanwu'].includes(e.type)){
    e.knockX=Math.cos(a)*100;
    e.knockY=Math.sin(a)*100;
  }
  addFT(e.x,e.y-e.size,(cr?'暴击! ':'')+'-'+dmg,cr?'#fa4':'#ff8',cr);
  pburst(e.x,e.y,e.color,5,60,.3);snd('hit');
  if(getLS()>0)player.hp=Math.min(player.maxHp,player.hp+dmg*getLS());
  if(e.hp<=0)killE(e);
}
function killE(e){
  const list=e.neutral?findCampOf(e)?.enemies:enemies;
  const idx=list?list.indexOf(e):-1;if(idx>=0)list.splice(idx,1);
  if(!e.neutral){const ei=enemies.indexOf(e);if(ei>=0)enemies.splice(ei,1)}
  pburst(e.x,e.y,e.color,20,120,.5);dropLoot(e.x,e.y,e.gold,e.ai==='boss',e);
  player.xp+=e.xp;kills++;
  player.questData.kills++;if(e.ai==='boss')player.questData.bossKills++;
  if(e.neutral)player.questData.materials++;
  
  // Sacred beast exclusive drops
  if(e.type==='qinglong'){
    addMaterial('qinglongScale',2);
    addMaterial('holyEssence',2);
    addMaterial('goldIngot',3);
    addFT(e.x,e.y-e.size-20,'获得青龙材料!','#4f4',true);
  }else if(e.type==='baihu'){
    addMaterial('baihuFang',2);
    addMaterial('fireEssence',2);
    addMaterial('goldIngot',3);
    addFT(e.x,e.y-e.size-20,'获得白虎材料!','#4f4',true);
  }else if(e.type==='zhuque'){
    addMaterial('zhuqueFeather',2);
    addMaterial('fireEssence',2);
    addMaterial('crystal',2);
    addFT(e.x,e.y-e.size-20,'获得朱雀材料!','#4f4',true);
  }else if(e.type==='xuanwu'){
    addMaterial('xuanwuShell',2);
    addMaterial('holyEssence',2);
    addMaterial('ironIngot',3);
    addFT(e.x,e.y-e.size-20,'获得玄武材料!','#4f4',true);
  }else if(['miniIce','miniFire','miniThunder','miniEarth'].includes(e.type)){
    const camp=findCampOf(e);
    if(camp&&camp.element){
      zoneDropBoost[camp.element]=45;
      const nameBy={ice:'寒霜',fire:'烈焰',thunder:'雷霆',earth:'地脉'};
      addFT(e.x,e.y-e.size-22,nameBy[camp.element]+'资源掉率提升! 45s','#ffd36a',true);
      pburst(e.x,e.y,'#ffd36a',22,130,.5);
    }
  }
  
  checkQuestProg('kill',1);if(e.ai==='boss')checkQuestProg('bossKill',1);if(e.neutral)checkQuestProg('material',1);
  if(['qinglong','baihu','zhuque','xuanwu'].includes(e.type))checkQuestProg('sacredBeast',1);
  addFT(e.x,e.y-e.size-10,'+'+e.xp+'经验','#af4');
  checkTalentUpgrade();
  while(player.xp>=player.xpN)lvlUp();
  // Check camp dead
  if(e.neutral){const camp=findCampOf(e);if(camp&&camp.enemies.length===0)camp.dead=true}
}
function findCampOf(e){return neutralCamps.find(c=>c.enemies.includes(e))||neutralCamps.find(c=>dst({x:c.x,y:c.y},e)<200)}
function lvlUp(){
  player.xp-=player.xpN;player.level++;player.xpN=~~(player.xpN*1.6);
  const cl=player.classData;
  // Class-specific scaling
  const hpG=cl?{warrior:25,mage:12,ranger:16}[player.classId]||18:18;
  const manaG=cl?{warrior:6,mage:18,ranger:10}[player.classId]||12:12;
  const atkG=cl?{warrior:4,mage:2,ranger:3}[player.classId]||3:3;
  const defG=cl?{warrior:2,mage:0,ranger:1}[player.classId]||1:1;
  player.maxHp+=hpG;player.hp=player.maxHp;player.maxMana+=manaG;player.mana=player.maxMana;
  player.bAtk+=atkG;player.bDef+=defG;player.critR+=.005;player.skillPts++;
  addFT(player.x,player.y-30,'升级! Lv.'+player.level+' (+1技能点)','#ff0',true);
  pburst(player.x,player.y,'#ff0',30,130,.6);snd('lvl');
}
//复活倒计时变量
let respawnTime=0;
let respawnTimer=0;

function die(){if(fort.hp<=0){//堡垒被摧毁，游戏结束
  gs='dead';snd('death');document.getElementById('deathScreen').style.display='flex';

}else{//玩家死亡，进入复活倒计时

  player.hp=0;

}}

// ============ UPDATE ============
function update(dt){
  if(gs==='respawning'){
    respawnTimer+=dt;
    if(respawnTimer>=respawnTime){
      //复活玩家
      player.hp=player.maxHp;
      player.mana=player.maxMana;
      player.x=FX*T;
      player.y=FY*T;
      gs='playing';
      addFT(player.x,player.y-20,'复活!','#4f4',true);
      pburst(player.x,player.y,'#4f4',30,100,.6);
    }else{
      //显示复活倒计时
      const remaining=Math.ceil(respawnTime-respawnTimer);
      addFT(player.x,player.y-20,remaining+'秒后复活...','#f44',true);
    }
    return;
  }
  if(gs!=='playing'||uiOpen)return;
  gTime+=dt;
  fortNoHitTime+=dt;
  for(const k of Object.keys(zoneDropBoost))if(zoneDropBoost[k]>0)zoneDropBoost[k]-=dt;
  
  // Check for event spawns
  checkEventSpawn();
  
  // Update events
  updateEvents(dt);
  // Waves
  if(!waveOn){waveT+=dt;if(waveT>=nextWD){waveT=0;spawnWave()}}
  else{
    // Continuous spawning over 5 seconds
    if(waveSpawnCount<waveSpawnTotal){
      waveSpawnT+=dt;
      const spawnInterval=5/waveSpawnTotal; // Spread over 5 seconds
      if(waveSpawnT>=spawnInterval){
        waveSpawnT-=spawnInterval;
        spawnEnemyInWave();
      }
    }
    // Wave ends when all enemies are dead AND all enemies have been spawned
    if(waveSpawnCount>=waveSpawnTotal&&enemies.filter(e=>!e.neutral).length===0){
      waveOn=0;waveT=0;addFT(player.x,player.y-30,'波次清除!','#4f4',true);
      // Check for victory at 50 waves
      if(waveN>=50){
        gs='victory';
        document.getElementById('victoryScreen').style.display='flex';
        const clName=player.classData?player.classData.name:'勇士';
        const wName=player.equip.weapon?player.equip.weapon.name:'无';
        document.getElementById('victoryStats').innerHTML=clName+' · 成功守卫堡垒 50 波!<br>等级 '+player.level+' · 击杀 '+kills+' · 金币 '+player.gold+'<br>武器: '+wName+' · 存活 '+~~gTime+'秒';
      }
    }
  }
  // Neutral respawn
  neutralCamps.forEach(c=>{if(c.dead){c.respawnT+=dt;if(c.respawnT>=60){c.respawnT=0;c.dead=false;
    c.enemies=[];
    if(c.biome==='wild'){
      const types=['goblin','spider','archer','wolf','ogre','gargoyle'];
      for(let i=0;i<5;i++)c.enemies.push(createWildNeutral(types[~~(Math.random()*types.length)],c.x+(Math.random()-.5)*80,c.y+(Math.random()-.5)*80,c.element));
    }else{
      const types=['bear','troll','wolf','goblin'];
      for(let i=0;i<3;i++)c.enemies.push(createNeutral(types[~~(Math.random()*types.length)],c.x+(i-1)*30,c.y+(Math.random()-.5)*20));
    }
  }}});

  // Fortress regen: 5s out of combat then heal
  if(fort.hp>0&&fort.hp<fort.maxHp&&fortNoHitTime>=5){
    fortRegenTick+=dt;
    if(fortRegenTick>=1){
      fortRegenTick=0;
      const heal=Math.max(8,~~(fort.maxHp*0.015));
      fort.hp=Math.min(fort.maxHp,fort.hp+heal);
      addFT(fort.x+(Math.random()-.5)*24,fort.y-FR*T+8,'+'+heal,'#6f6');
    }
  }else{
    fortRegenTick=0;
  }

  // Player movement
  let dx=0,dy=0;
  if(keys.w||keys.arrowup)dy=-1;if(keys.s||keys.arrowdown)dy=1;if(keys.a||keys.arrowleft)dx=-1;if(keys.d||keys.arrowright)dx=1;
  if(dx&&dy){dx*=.707;dy*=.707}
  if(player.dashing){player.dashT-=dt;const ds=520*dt;const nx=player.x+player.dashDx*ds,ny=player.y+player.dashDy*ds;
    if(!blk(nx,player.y,player.w,player.h))player.x=nx;if(!blk(player.x,ny,player.w,player.h))player.y=ny;
    if(player.dashT<=0)player.dashing=0;pburst(player.x,player.y,'#8cf',1,40,.3);
  }else{const spd=getSpd()*dt;const nx=player.x+dx*spd,ny=player.y+dy*spd;
    if(!blk(nx,player.y,player.w,player.h))player.x=nx;if(!blk(player.x,ny,player.w,player.h))player.y=ny}
  if(dx||dy)player.facing=Math.atan2(dy,dx);
  
  // Check for event interaction
  checkEventInteraction();
  // Regen - class-specific rates
  const manaRegen=player.classId==='mage'?3.5:2;
  player.manaRT+=dt;if(player.manaRT>=.4){player.mana=Math.min(player.maxMana,player.mana+manaRegen);player.manaRT=0}
  const hpRegenRate=player.classId==='warrior'?1.2:2;
  const hpRegenAmt=player.classId==='warrior'?3:1;
  player.hpRT+=dt;if(player.hpRT>=hpRegenRate){player.hp=Math.min(player.maxHp,player.hp+hpRegenAmt);player.hpRT=0}
  player.animT+=dt;if(player.animT>.15){player.animF=(player.animF+1)%4;player.animT=0}
  if(player.invuln>0)player.invuln-=dt;if(player.flashT>0)player.flashT-=dt;
  if(player.atkCd>0)player.atkCd-=dt;
  if(player.atkT>0){player.atkT-=dt;if(player.atkT<=0)player.attacking=0}
  for(const k in player.skillCds)if(player.skillCds[k].cd>0)player.skillCds[k].cd-=dt;
  for(let i=player.buffs.length-1;i>=0;i--){player.buffs[i].time-=dt;if(player.buffs[i].time<=0)player.buffs.splice(i,1)}

  // Sword aura
  if(player.swordAura>0){player.swordAuraT+=dt;player.swordAura-=dt;
    const allE=[...enemies,...neutralCamps.flatMap(c=>c.enemies)];
    allE.forEach(e=>{if(dst(player,e)<55+e.size&&Math.random()<.12)dmgE(e,~~(getAtk()*.35),true)});
    pburst(player.x,player.y,'#ccf',1,50,.2)}
  
  // Warrior: War Cry
  if(player.warCry>0){player.warCryT+=dt;player.warCry-=dt;
    // Increase attack and defense
    player.tempAtkBoost=20+skLv('warcry')*5;
    player.tempDefBoost=10+skLv('warcry')*3;
  } else {
    player.tempAtkBoost=0;
    player.tempDefBoost=0;
  }
  
  // Warrior: Whirlwind
  if(player.whirlwind>0){player.whirlwindT+=dt;player.whirlwind-=dt;
    // Spin attack
    const allE=[...enemies,...neutralCamps.flatMap(c=>c.enemies)];
    allE.forEach(e=>{if(dst(player,e)<60+e.size&&Math.random()<.2)dmgE(e,~~(getAtk()*.5),true)});
    pburst(player.x,player.y,'#c84030',2,60,.3);
  }
  
  // Ranger: Haste
  if(player.haste>0){player.hasteT+=dt;player.haste-=dt;
    // Increase movement speed
    player.tempSpeedBoost=30+skLv('haste')*5;
  } else {
    player.tempSpeedBoost=0;
  }
  

  // Storm zones
  player.stormZones=player.stormZones.filter(z=>{z.life-=dt;z.t+=dt;
    if(z.t>.5){z.t=0;const allE=[...enemies,...neutralCamps.flatMap(c=>c.enemies)];
      allE.forEach(e=>{if(dst(z,e)<z.r+e.size)dmgE(e,z.dmg,true)});pburst(z.x,z.y,'#f84',3,40,.2)}
    return z.life>0});
  // Frost zones
  player.frostZones=player.frostZones.filter(z=>{z.life-=dt;
    const allE=[...enemies,...neutralCamps.flatMap(c=>c.enemies)];
    allE.forEach(e=>{if(dst(z,e)<z.r+e.size){e.frozen=Math.max(e.frozen,1);if(z.dmgT<=0){dmgE(e,z.dmg,true);z.dmgT=1}}});
    z.dmgT-=dt;return z.life>0});

  // Basic attack - class-specific
  if(mouse.clicked&&player.atkCd<=0&&!player.dashing){mouse.clicked=0;
    const wx=mouse.x-W/2+cam.x,wy=mouse.y-H/2+cam.y;player.atkAng=Math.atan2(wy-player.y,wx-player.x);
    player.attacking=1;player.atkT=.18;player.atkCd=.3;snd('swing');
    const allE=[...enemies,...neutralCamps.flatMap(c=>c.enemies)];
    
    // Class-specific attack patterns
    switch(player.classId){
      case 'warrior':
        // Warrior: wide arc attack
        allE.forEach(e=>{const d=dst(player,e);if(d<50+e.size){const a=Math.atan2(e.y-player.y,e.x-player.x);
          let df=a-player.atkAng;while(df>Math.PI)df-=Math.PI*2;while(df<-Math.PI)df+=Math.PI*2;
          if(Math.abs(df)<Math.PI/2){dmgE(e,0);if(e.neutral)e.aggro=true}}});
        pburst(player.x,player.y,'#c84030',8,60,.3);
        break;
        
      case 'mage':
        // Mage: magic projectiles
        const a=player.atkAng;
        projectiles.push({x:player.x,y:player.y,vx:Math.cos(a)*200,vy:Math.sin(a)*200,dmg:15,life:2,type:'magic',size:5});
        snd('fire');
        break;
        
      case 'ranger':
        // Ranger: rapid arrows
        const ar=player.atkAng;
        projectiles.push({x:player.x,y:player.y,vx:Math.cos(ar)*250,vy:Math.sin(ar)*250,dmg:10,life:1.5,type:'arrow',size:3});
        snd('arrow');
        // Second arrow with slight spread
        setTimeout(()=>{
          if(player.hp>0){
            projectiles.push({x:player.x,y:player.y,vx:Math.cos(ar+Math.PI/12)*250,vy:Math.sin(ar+Math.PI/12)*250,dmg:10,life:1.5,type:'arrow',size:3});
          }
        },100);
        break;
        

        
      default:
        // Default attack
        allE.forEach(e=>{const d=dst(player,e);if(d<46+e.size){const a=Math.atan2(e.y-player.y,e.x-player.x);
          let df=a-player.atkAng;while(df>Math.PI)df-=Math.PI*2;while(df<-Math.PI)df+=Math.PI*2;
          if(Math.abs(df)<Math.PI/3){dmgE(e,0);if(e.neutral)e.aggro=true}}});
    }
  }
  mouse.clicked=0;

  // Skills (only if learned)
  const wx=()=>mouse.x-W/2+cam.x,wy=()=>mouse.y-H/2+cam.y;
  // Q: Fireball
  if(keys.q&&skLv('q')>0&&player.skillCds.q.cd<=0&&player.mana>=skMana('q')){keys.q=0;player.mana-=skMana('q');player.skillCds.q.cd=skCd('q');
    const a=Math.atan2(wy()-player.y,wx()-player.x);projectiles.push({x:player.x,y:player.y,vx:Math.cos(a)*270,vy:Math.sin(a)*270,dmg:skDmg('q'),life:2,type:'fire',size:7});snd('fire')}
  // Ice Nova (right click)
  if(mouse.rclick&&skLv('ice')>0&&player.skillCds.ice.cd<=0&&player.mana>=skMana('ice')){mouse.rclick=0;player.mana-=skMana('ice');player.skillCds.ice.cd=skCd('ice');snd('ice');
    pburst(player.x,player.y,'#8cf',30,150,.5);aoes.push({x:player.x,y:player.y,r:0,mr:110,life:.4,ml:.4,color:'#8cf'});
    const allE=[...enemies,...neutralCamps.flatMap(c=>c.enemies)];
    allE.forEach(e=>{if(dst(player,e)<110+e.size){dmgE(e,skDmg('ice'),true);e.frozen=3;if(e.neutral)e.aggro=true}})}
