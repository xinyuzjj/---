      for(let i=-1;i<=1;i++)aoes.push({x:e.x+Math.cos(clawA+i*.25)*38,y:e.y+Math.sin(clawA+i*.25)*38,r:0,mr:42,life:.28,ml:.28,color:'#dff'});
      if(dpp<95)hurtP(~~(e.atk*1.45),.45);
      setTimeout(()=>{if(e.hp>0&&dst(e,player)<90){hurtP(~~(e.atk*1.1),.25);pburst(player.x,player.y,'#eaf',8,70,.24);}},220);
    }
    if(e.type==='zhuque'&&e.specialCd<=0&&dpp<150){e.specialCd=4.1;
      snd('fire');addFT(e.x,e.y-24,'朱雀·焚羽','#ffb27a');
      const a=Math.atan2(player.y-e.y,player.x-e.x);
      for(let i=0;i<6;i++){
        const angle=a+(Math.random()-.5)*Math.PI/3;
        eProj.push({x:e.x,y:e.y,vx:Math.cos(angle)*(170+Math.random()*40),vy:Math.sin(angle)*(170+Math.random()*40),dmg:~~(e.atk*.62),life:2.1,type:'feather',size:6,color:'#ff7d4a',edge:'#ffe3b0'});
      }
      for(let i=0;i<9;i++){
        const t=i/8,px=e.x+Math.cos(a)*140*t,py=e.y+Math.sin(a)*140*t;
        setTimeout(()=>{if(e.hp>0){pburst(px,py,'#ff914d',5,45,.2);if(dst({x:px,y:py},player)<32)hurtP(~~(e.atk*.35),.1);}},i*55);
      }
    }
    if(e.type==='xuanwu'&&e.specialCd<=0&&dpp<180){e.specialCd=5.2;
      snd('slam');addFT(e.x,e.y-26,'玄武·地脉护盾','#9fb6ff');
      e.shieldUp=2.8;
      pburst(e.x,e.y,'#79a',16,120,.45);
      aoes.push({x:e.x,y:e.y,r:0,mr:125,life:.65,ml:.65,color:'#79a'});
      aoes.push({x:e.x,y:e.y,r:0,mr:78,life:.7,ml:.7,color:'#a9c'});
      if(dpp<120){hurtP(~~(e.atk*1.18),.5);player.tempSpeedBoost-=18;setTimeout(()=>{if(player.hp>0)player.tempSpeedBoost+=18;},2500);}
    }
    if(e.type==='miniIce'&&e.specialCd<=0&&dpp<170){e.specialCd=3.2;
      snd('ice');addFT(e.x,e.y-20,'寒霜爆裂','#9ef');aoes.push({x:e.x,y:e.y,r:0,mr:90,life:.45,ml:.45,color:'#9ef'});
      if(dpp<100){hurtP(~~(e.atk*1.1),.35);player.tempSpeedBoost-=14;setTimeout(()=>{if(player.hp>0)player.tempSpeedBoost+=14;},1800);}
    }
    if(e.type==='miniFire'&&e.specialCd<=0&&dpp<170){e.specialCd=3.1;
      snd('fire');addFT(e.x,e.y-20,'熔火喷发','#f96');
      const a=Math.atan2(player.y-e.y,player.x-e.x);
      for(let i=0;i<4;i++)eProj.push({x:e.x,y:e.y,vx:Math.cos(a+(i-1.5)*.18)*190,vy:Math.sin(a+(i-1.5)*.18)*190,dmg:~~(e.atk*.7),life:2,type:'feather',size:5,color:'#ff8748',edge:'#ffd9a8'});
    }
    if(e.type==='miniThunder'&&e.specialCd<=0&&dpp<165){e.specialCd=2.9;
      snd('zap');addFT(e.x,e.y-20,'雷击爪','#ffe28a');
      for(let k=1;k<=3;k++)setTimeout(()=>{if(e.hp>0){const px=e.x+(player.x-e.x)*(k/3),py=e.y+(player.y-e.y)*(k/3);pburst(px,py,'#eef6a0',5,45,.2);if(dst({x:px,y:py},player)<30)hurtP(~~(e.atk*.55),.18);}},k*90);
    }
    if(e.type==='miniEarth'&&e.specialCd<=0&&dpp<180){e.specialCd=3.8;
      snd('slam');addFT(e.x,e.y-20,'地脉震荡','#cb9');aoes.push({x:e.x,y:e.y,r:0,mr:105,life:.55,ml:.55,color:'#9a7d58'});
      if(dpp<115)hurtP(~~(e.atk*1.15),.42);
    }
    
    // Charge enemies
    if(e.ai==='charge'&&e.specialCd<=0&&dpp<200&&dpp>60){e.specialCd=4;e.chargeT=.3;
      const a=Math.atan2(player.y-e.y,player.x-e.x);e.chargeDx=Math.cos(a);e.chargeDy=Math.sin(a);pburst(e.x,e.y,e.color,5,60,.3)}
    if(e.chargeT>0){e.chargeT-=dt;const cs=400*dt;e.x+=e.chargeDx*cs;e.y+=e.chargeDy*cs;
      if(dpp<e.size+20)hurtP(~~(e.atk*1.5),.5);}

    if(e.frozen>0&&Math.random()<.2)pburst(e.x,e.y,'#8cf',1,20,.3);
  }

  // Player projectiles
  for(let i=projectiles.length-1;i>=0;i--){const p=projectiles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    if(tAt(p.x,p.y)===1){pburst(p.x,p.y,'#f84',8,80,.3);projectiles.splice(i,1);continue}
    if(p.life<=0){projectiles.splice(i,1);continue}
    let hit=0;const allE=[...enemies,...neutralCamps.flatMap(c=>c.enemies)];
    for(const e of allE){if(dst(p,e)<p.size+e.size){dmgE(e,p.dmg,true);if(e.neutral)e.aggro=true;hit=1;
      pburst(p.x,p.y,'#f84',12,100,.4);aoes.push({x:p.x,y:p.y,r:0,mr:45,life:.25,ml:.25,color:'#f84'});
      allE.forEach(e2=>{if(e2!==e&&dst(p,e2)<45+e2.size){dmgE(e2,~~(p.dmg*.4),true);if(e2.neutral)e2.aggro=true}});break}}
    if(hit)projectiles.splice(i,1);else pburst(p.x,p.y,'#f62',1,20,.2)}
  // Enemy projectiles
  for(let i=eProj.length-1;i>=0;i--){const p=eProj[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    if(tAt(p.x,p.y)===1||p.life<=0){eProj.splice(i,1);continue}
    if(dst(p,player)<p.size+12){
      hurtP(p.dmg,.3);eProj.splice(i,1);continue}
    // Hit fortress
    if(dst(p,fort)<FR*T){fort.hp-=~~(p.dmg*.5);fortNoHitTime=0;eProj.splice(i,1);if(fort.hp<=0){fort.hp=0;die()}}}

  // AOE effects
  for(let i=aoes.length-1;i>=0;i--){const a=aoes[i];a.life-=dt;a.r=a.mr*(1-a.life/a.ml);if(a.life<=0)aoes.splice(i,1)}
  // Loot
  for(let i=loot.length-1;i>=0;i--){const l=loot[i];l.bobT+=dt*3;if(dst(player,l)<30){addToInv(l);addFT(l.x,l.y-10,l.name,RC[l.rarity]);snd('pickup');loot.splice(i,1)}}
  // Particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.95;p.vy*=.95;p.life-=dt;if(p.life<=0)particles.splice(i,1)}
  for(let i=fTexts.length-1;i>=0;i--){const t=fTexts[i];t.y-=42*dt;t.life-=dt;if(t.life<=0)fTexts.splice(i,1)}
  cam.x+=(player.x-cam.x)*5*dt;cam.y+=(player.y-cam.y)*5*dt;
  if(cam.sk>0){cam.sk-=dt;cam.sx=(Math.random()-.5)*cam.sk*45;cam.sy=(Math.random()-.5)*cam.sk*45}else{cam.sx=0;cam.sy=0}
}

// ============ DRAW ============
function draw(){
  ctx.fillStyle='#060804';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.translate(W/2-cam.x+cam.sx,H/2-cam.y+cam.sy);
  const vx1=~~((cam.x-W/2)/T)-1,vy1=~~((cam.y-H/2)/T)-1,vx2=Math.ceil((cam.x+W/2)/T)+1,vy2=Math.ceil((cam.y+H/2)/T)+1;
  // Draw pre-rendered background
  if(bgCanvas){
    const sx=Math.max(0,vx1*T),sy=Math.max(0,vy1*T);
    const ex=Math.min(MW*T,vx2*T),ey=Math.min(MH*T,vy2*T);
    if(ex>sx&&ey>sy){
      // Draw background directly using screen coordinates
      ctx.restore(); // Restore to original context
      ctx.drawImage(bgCanvas,sx,sy,ex-sx,ey-sy,sx-cam.x+W/2,sy-cam.y+H/2,ex-sx,ey-sy);
      ctx.save(); // Save context again for other drawing
      ctx.translate(W/2-cam.x+cam.sx,H/2-cam.y+cam.sy);
    }
  }
  // Animated environmental effects on top of cached bg
  const time=gTime;
  // Flickering torch points at fortress corners & gates
  const torchPts=[[FX-FR,FY-FR],[FX+FR,FY-FR],[FX-FR,FY+FR],[FX+FR,FY+FR],
    [FX,FY-FR-1],[FX,FY+FR+1],[FX-FR-1,FY],[FX+FR+1,FY]];
  torchPts.forEach(([tx,ty])=>{
    const px=tx*T+T/2,py=ty*T+T/2;
    const flicker=0.7+Math.sin(time*4+tx*3)*0.15+Math.sin(time*7+ty*2)*0.1;
    const gr=ctx.createRadialGradient(px,py,2,px,py,48*flicker);
    gr.addColorStop(0,'rgba(255,180,60,.14)');gr.addColorStop(.3,'rgba(255,140,40,.06)');gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.fillRect(px-50,py-50,100,100);
    // Torch flame sprite
    ctx.fillStyle='#f8a020';ctx.fillRect(px-1,py-4,3,5);
    ctx.fillStyle='#ffd040';ctx.fillRect(px,py-6+Math.sin(time*8+tx)*2,2,3);
    ctx.fillStyle='#fff8';ctx.fillRect(px,py-4,1,2);
  });
  // Animated mist/fog patches drifting across ground
  for(let i=0;i<6;i++){
    const mx=(((time*8+i*400)%((MW+20)*T)))-10*T;
    const my=(MH/2+Math.sin(i*2.5+time*.3)*20)*T;
    const mr=80+i*20;
    const mg=ctx.createRadialGradient(mx,my,0,mx,my,mr);
    mg.addColorStop(0,'rgba(140,160,120,.025)');mg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=mg;ctx.fillRect(mx-mr,my-mr,mr*2,mr*2);
  }
  // Fortress - detailed castle
  const fx=FX*T,fy=FY*T;
  // Ground glow around fortress
  const fg=ctx.createRadialGradient(fx,fy,20,fx,fy,FR*T*1.2);fg.addColorStop(0,'rgba(240,200,80,.05)');fg.addColorStop(.5,'rgba(255,160,40,.02)');fg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=fg;ctx.fillRect(fx-FR*T*1.2,fy-FR*T*1.2,FR*2.4*T,FR*2.4*T);
  // Castle base/platform
  ctx.fillStyle='#3a3a4a';ctx.fillRect(fx-20,fy-24,40,42);
  ctx.fillStyle='#484860';ctx.fillRect(fx-22,fy-26,44,6);
  // Towers at corners
  [[-18,-20],[18,-20],[-18,14],[18,14]].forEach(([ox,oy])=>{
    ctx.fillStyle='#4a4a5a';ctx.fillRect(fx+ox-5,fy+oy-4,10,12);
    ctx.fillStyle='#5a5a6a';ctx.fillRect(fx+ox-6,fy+oy-6,12,4);
    // Tower top crenellation
    ctx.fillStyle='#5a5a6a';
    ctx.fillRect(fx+ox-6,fy+oy-8,3,3);ctx.fillRect(fx+ox+3,fy+oy-8,3,3);
  });
  // Main keep
  ctx.fillStyle='#444458';ctx.fillRect(fx-10,fy-18,20,30);
  ctx.fillStyle='#5a5a6e';ctx.fillRect(fx-12,fy-22,24,6);
  // Keep crenellation
  for(let i=-12;i<=9;i+=6){ctx.fillStyle='#5a5a6e';ctx.fillRect(fx+i,fy-26,4,5)}
  // Gate
  ctx.fillStyle='#1a1810';ctx.fillRect(fx-5,fy+6,10,14);
  ctx.fillStyle='#2a2820';ctx.beginPath();ctx.arc(fx,fy+6,5,Math.PI,0);ctx.fill();
  // Windows - warm glow
  [[-4,-12],[4,-12],[-4,-4],[4,-4]].forEach(([ox,oy])=>{
    ctx.fillStyle='#f0c040';ctx.fillRect(fx+ox-1,fy+oy-1,3,4);
    const wg=ctx.createRadialGradient(fx+ox,fy+oy,0,fx+ox,fy+oy,12);
    wg.addColorStop(0,'rgba(255,200,80,.08)');wg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=wg;ctx.fillRect(fx+ox-12,fy+oy-12,24,24);
  });
  // Banner
  const bannerWave=Math.sin(time*3)*2;
  ctx.fillStyle='#c41e1e';ctx.beginPath();ctx.moveTo(fx+2,fy-22);ctx.lineTo(fx+10+bannerWave,fy-18);ctx.lineTo(fx+10+bannerWave*.7,fy-14);ctx.lineTo(fx+6+bannerWave*.3,fy-16);ctx.lineTo(fx+2,fy-12);ctx.fill();
  ctx.fillStyle='#6a3a1a';ctx.fillRect(fx+1,fy-28,2,18);
  // Fort HP bar
  const fw=FR*2*T;ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(fx-fw/2,fy-FR*T-18,fw,10);
  const hr=fort.hp/fort.maxHp;ctx.fillStyle=hr>.5?'#4a8':'#c44';ctx.fillRect(fx-fw/2+1,fy-FR*T-17,(fw-2)*hr,8);
  ctx.fillStyle='#fff';ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.fillText('堡垒 '+fort.hp+'/'+fort.maxHp,fx,fy-FR*T-20);
  // Shops - with tent/stall visuals
  shops.forEach(sh=>{
    // Shop tent/stall base
    ctx.fillStyle='rgba(30,25,18,.7)';ctx.fillRect(sh.x-16,sh.y-14,32,28);
    ctx.fillStyle=sh.color+'22';ctx.fillRect(sh.x-16,sh.y-14,32,28);
    // Awning
    ctx.fillStyle=sh.color+'66';ctx.fillRect(sh.x-18,sh.y-16,36,6);
    ctx.fillStyle=sh.color+'44';ctx.fillRect(sh.x-18,sh.y-17,36,2);
    // Glow circle
    const sg=ctx.createRadialGradient(sh.x,sh.y,5,sh.x,sh.y,30);
    sg.addColorStop(0,sh.color+'18');sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(sh.x,sh.y,30,0,Math.PI*2);ctx.fill();
    // Icon
    ctx.fillStyle=sh.color;ctx.font='18px serif';ctx.textAlign='center';ctx.fillText(sh.icon,sh.x,sh.y+6);
    ctx.fillStyle='#cca';ctx.font='bold 9px monospace';ctx.fillText(sh.name,sh.x,sh.y-22);
    if(dst(player,sh)<55){ctx.fillStyle='#f0c040';ctx.font='bold 10px monospace';ctx.fillText('[空格]',sh.x,sh.y-34)}});
  // NPCs
  npcs.forEach(npc=>{
    const hasQuest=quests.some(q=>q.npc===npc.type&&!q.done&&!q.accepted);
    const canComplete=quests.some(q=>q.npc===npc.type&&q.accepted&&!q.done&&q.prog>=q.need);
    ctx.fillStyle=npc.color+'44';ctx.beginPath();ctx.arc(npc.x,npc.y,16,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=npc.color;ctx.font='16px serif';ctx.textAlign='center';ctx.fillText(npc.icon,npc.x,npc.y+5);
    ctx.fillStyle='#aa8';ctx.font='bold 9px monospace';ctx.fillText(npc.name,npc.x,npc.y-20);
    if(hasQuest){ctx.fillStyle='#ff0';ctx.font='bold 16px monospace';ctx.fillText('!',npc.x,npc.y-30)}
    if(canComplete){ctx.fillStyle='#4f4';ctx.font='bold 16px monospace';ctx.fillText('?',npc.x,npc.y-30)}
    if(dst(player,npc)<55){ctx.fillStyle='#f0c040';ctx.font='bold 10px monospace';ctx.fillText('[空格]',npc.x,npc.y-42)}});
  // Neutral camp indicators - campfire glow
  neutralCamps.forEach(c=>{if(!c.dead){
    const hasBeast=c.enemies.some(e=>['qinglong','baiHU','zhuque','xuanwu','baihu','baihu'].includes(e.type));
    if(hasBeast){
      // Sacred beast area
      const beast=c.enemies.find(e=>['qinglong','BaiHU','zhuque','xuanwu','baiHU','baihu'].includes(e.type));
      if(beast){
        // Sacred beast area glow
        const sg=ctx.createRadialGradient(c.x,c.y,30,c.x,c.y,120);
        sg.addColorStop(0,beast.color+'44');sg.addColorStop(1,beast.color+'00');
        ctx.fillStyle=sg;ctx.beginPath();ctx.arc(c.x,c.y,120,0,Math.PI*2);ctx.fill();
        
        // Add decorative elements based on beast type
        switch(beast.type){
          case 'qinglong':
            // Green wind particles
            for(let i=0;i<5;i++){
              const angle=Math.random()*Math.PI*2;
              const distance=30+Math.random()*80;
              const x=c.x+Math.cos(angle)*distance;
              const y=c.y+Math.sin(angle)*distance;
              ctx.fillStyle='#44cc4488';
              ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
            }
            break;
          case 'baihu':
          case 'BaiHU':
          case 'baiHU':
            // White lightning effects
            for(let i=0;i<3;i++){
              const angle=Math.random()*Math.PI*2;
              const distance=40+Math.random()*60;
              const x=c.x+Math.cos(angle)*distance;
              const y=c.y+Math.sin(angle)*distance;
              ctx.fillStyle='#ffffff99';
              ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
            }
            break;
          case 'zhuque':
            // Fire particles
            for(let i=0;i<6;i++){
              const angle=Math.random()*Math.PI*2;
              const distance=35+Math.random()*70;
              const x=c.x+Math.cos(angle)*distance;
              const y=c.y+Math.sin(angle)*distance;
              ctx.fillStyle='#ff444499';
              ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
            }
            break;
          case 'xuanwu':
            // Earth particles
            for(let i=0;i<4;i++){
              const angle=Math.random()*Math.PI*2;
              const distance=30+Math.random()*80;
              const x=c.x+Math.cos(angle)*distance;
              const y=c.y+Math.sin(angle)*distance;
              ctx.fillStyle='#44448899';
              ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();
            }
            break;
        }
        
        // Add beast name label
        ctx.fillStyle='#fff';ctx.font='bold 12px monospace';ctx.textAlign='center';
        ctx.fillText(beast.name,c.x,c.y-60);
        ctx.fillStyle='#aa8';ctx.font='8px monospace';
        ctx.fillText('四大神兽',c.x,c.y-45);
      }
    }else{
      // Regular camp
      // Ground circle
      const wild=c.biome==='wild';
      ctx.fillStyle=wild?'rgba(60,80,140,.08)':'rgba(120,80,20,.06)';ctx.beginPath();ctx.arc(c.x,c.y,wild?68:55,0,Math.PI*2);ctx.fill();
      // Campfire glow
      const cf=0.8+Math.sin(time*6+c.id*2)*0.15;
      const cg=ctx.createRadialGradient(c.x,c.y,4,c.x,c.y,(wild?48:35)*cf);
      cg.addColorStop(0,wild?'rgba(120,150,255,.14)':'rgba(255,140,40,.12)');
      cg.addColorStop(.5,wild?'rgba(90,120,210,.05)':'rgba(255,80,20,.04)');
      cg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=cg;ctx.fillRect(c.x-50,c.y-50,100,100);
      if(wild){
        const ec=c.element==='ice'?'#8fd8ff':c.element==='fire'?'#ff8a52':c.element==='thunder'?'#d7c66a':'#8a7658';
        const en=c.element==='ice'?'冰域':c.element==='fire'?'火域':c.element==='thunder'?'雷域':'土域';
        ctx.fillStyle='#3f4f78';ctx.fillRect(c.x-5,c.y-2,10,4);
        ctx.fillStyle=ec;ctx.fillRect(c.x-2,c.y-7+Math.sin(time*10+c.id)*1.2,4,6);
        ctx.fillStyle='#eef';ctx.fillRect(c.x-1,c.y-9+Math.sin(time*12+c.id)*1.4,2,4);
        ctx.fillStyle=ec;ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText(en+'野区',c.x,c.y-62);
        if(zoneDropBoost[c.element]>0){ctx.fillStyle='#ffd36a';ctx.fillText('掉率提升 '+Math.ceil(zoneDropBoost[c.element])+'s',c.x,c.y-72);}
      }else{
        // Campfire
        ctx.fillStyle='#8a4a1a';ctx.fillRect(c.x-4,c.y-1,8,4);
        ctx.fillStyle='#f08020';ctx.fillRect(c.x-2,c.y-4+Math.sin(time*10+c.id)*1,4,4);
        ctx.fillStyle='#ffc040';ctx.fillRect(c.x-1,c.y-5+Math.sin(time*12+c.id)*1.5,2,3);
        ctx.fillStyle='#886';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText('野怪营地',c.x,c.y-55);
      }
    }
  }});
  // Torch glow - layered atmospheric lighting
  const flick=0.85+Math.sin(time*5)*0.08+Math.sin(time*9)*0.05;
  const tg=ctx.createRadialGradient(player.x,player.y,10,player.x,player.y,280*flick);
  tg.addColorStop(0,'rgba(255,200,100,.09)');tg.addColorStop(.2,'rgba(255,160,60,.06)');tg.addColorStop(.5,'rgba(255,120,40,.025)');tg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=tg;ctx.fillRect(player.x-300,player.y-300,600,600);
  // Vignette darkness at edges of view
  const vg=ctx.createRadialGradient(cam.x,cam.y,W*.25,cam.x,cam.y,W*.7);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(.7,'rgba(0,0,0,.15)');vg.addColorStop(1,'rgba(0,0,0,.4)');
  ctx.fillStyle=vg;ctx.fillRect(cam.x-W,cam.y-H,W*2,H*2);
  // Storm/Frost zones
  player.stormZones.forEach(z=>{ctx.beginPath();ctx.arc(z.x,z.y,z.r,0,Math.PI*2);ctx.fillStyle='rgba(255,100,30,.12)';ctx.fill();
    ctx.strokeStyle='#f84';ctx.lineWidth=2;ctx.stroke();pburst(z.x+(Math.random()-.5)*z.r,z.y+(Math.random()-.5)*z.r,'#f84',1,30,.3)});
  player.frostZones.forEach(z=>{ctx.beginPath();ctx.arc(z.x,z.y,z.r,0,Math.PI*2);ctx.fillStyle='rgba(100,180,255,.1)';ctx.fill();
    ctx.strokeStyle='#8cf';ctx.lineWidth=2;ctx.stroke()});
  // AOE
  aoes.forEach(a=>{
    const lifeRatio=a.life/a.ml;
    ctx.beginPath();ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
    ctx.strokeStyle=a.color;ctx.lineWidth=2+2*lifeRatio;ctx.globalAlpha=.7*lifeRatio;ctx.stroke();
    ctx.globalAlpha=.12*lifeRatio;ctx.fillStyle=a.color;ctx.fill();
    ctx.beginPath();ctx.arc(a.x,a.y,a.r*.72,0,Math.PI*2);ctx.globalAlpha=.22*lifeRatio;ctx.stroke();
    ctx.globalAlpha=1;
  });
  // Loot
  loot.forEach(l=>{const b=Math.sin(l.bobT)*3;
    const lg=ctx.createRadialGradient(l.x,l.y+b,1,l.x,l.y+b,14);
    lg.addColorStop(0,RC[l.rarity]+'66');lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=lg;ctx.beginPath();ctx.arc(l.x,l.y+b,14,0,Math.PI*2);ctx.fill();
    ctx.font='16px serif';ctx.textAlign='center';ctx.fillText(l.icon,l.x,l.y+b);
    ctx.beginPath();ctx.arc(l.x,l.y+b,10,0,Math.PI*2);ctx.strokeStyle=RC[l.rarity]+'88';ctx.lineWidth=1.2;ctx.stroke();
    if(l.set){ctx.strokeStyle='#ffd700';ctx.lineWidth=1.2;ctx.stroke()}
  });
  // Draw all enemies (wave + neutral)
  const allE=[...enemies,...neutralCamps.flatMap(c=>c.enemies)];
  allE.forEach(e=>{if(e.hp<=0)return;drawEnemy(e)});
  // Enemy projectiles
  eProj.forEach(p=>{
    if(p.type==='arrow'){
      const ang=Math.atan2(p.vy,p.vx);ctx.save();ctx.translate(p.x,p.y);ctx.rotate(ang);
      ctx.fillStyle='#dca458';ctx.fillRect(-p.size*1.8,-p.size*.35,p.size*3.6,p.size*.7);
      ctx.beginPath();ctx.moveTo(p.size*1.8,-p.size*.9);ctx.lineTo(p.size*2.8,0);ctx.lineTo(p.size*1.8,p.size*.9);ctx.fill();
      ctx.restore();
    }else{
      const core=p.color||'#a040ff',edge=p.edge||'#f2d0ff';
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*3.2);
      g.addColorStop(0,edge);g.addColorStop(.38,core);g.addColorStop(1,'rgba(120,40,200,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.size*2.4,0,Math.PI*2);ctx.fill();
    }
  });
  // Player projectiles
  projectiles.forEach(p=>{
    if(p.type==='arrow'){
      // Draw arrow for ranger
      const angle=Math.atan2(p.vy,p.vx);
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(angle);
      // Arrow shaft
      ctx.fillStyle='#dda040';
      ctx.fillRect(-p.size*2,-p.size/2,p.size*4,p.size);
      // Arrow head
      ctx.beginPath();
      ctx.moveTo(p.size*2,-p.size);
      ctx.lineTo(p.size*3,0);
      ctx.lineTo(p.size*2,p.size);
      ctx.fill();
      // Feathers
      ctx.fillStyle='#8a6a4a';
      ctx.beginPath();
      ctx.moveTo(-p.size*2,-p.size);
      ctx.lineTo(-p.size*3,-p.size*1.5);
      ctx.lineTo(-p.size*2,-p.size/2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-p.size*2,p.size);
      ctx.lineTo(-p.size*3,p.size*1.5);
      ctx.lineTo(-p.size*2,p.size/2);
      ctx.fill();
      ctx.restore();
    } else {
      // Default projectile for mage
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*4);
      g.addColorStop(0,'#fff4b8');
      g.addColorStop(.2,'#ffa240');
      g.addColorStop(.5,'#f24a2a');
      g.addColorStop(1,'rgba(255,60,0,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.size*2.6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(p.x,p.y,p.size*.8,0,Math.PI*2);ctx.fill();
    }
  });
  // Player
  drawPlayer();
  // Particles
  particles.forEach(p=>{const a=p.life/p.ml;ctx.globalAlpha=a;ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size*a,p.size*a)});ctx.globalAlpha=1;
  // Floating texts
  fTexts.forEach(t=>{const a=t.life/t.ml;ctx.globalAlpha=a;ctx.fillStyle=t.color;ctx.font=(t.big?'bold 15px':'bold 12px')+' monospace';ctx.textAlign='center';
    if(t.big){ctx.strokeStyle='#000';ctx.lineWidth=3;ctx.strokeText(t.text,t.x,t.y)}ctx.fillText(t.text,t.x,t.y)});ctx.globalAlpha=1;
  // Draw events
  drawEvents();
  ctx.restore();
  drawHUD();drawMinimap();
}

function drawEnemy(e){
  const s=e.size/14;ctx.save();ctx.translate(e.x,e.y);
  if(e.flashT>0)ctx.globalAlpha=.4+Math.sin(e.flashT*60)*.6;
  if(e.frozen>0)ctx.globalAlpha*=.8;
  const f=e.animF,px=(c,ox,oy,w,h)=>{ctx.fillStyle=c;ctx.fillRect(ox*s,oy*s,w*s,h*s)};
  const c=e.frozen>0?'#6ac8e8':e.color;
  // Shadow
  ctx.fillStyle='#0003';ctx.beginPath();ctx.ellipse(0,e.size*s*.8,e.size*s*.7,3*s,0,0,Math.PI*2);ctx.fill();
  
  // Slime - jelly-like creature
  if(e.type==='slime'){
    const sq=1+Math.sin(e.animT*4)*.12;
    ctx.fillStyle=c;
    ctx.beginPath();ctx.ellipse(0,4*s,12*s*sq,10*s/sq,0,0,Math.PI*2);ctx.fill();
    // Eyes
    px('#fff',-5,-4,3,3);px('#fff',2,-4,3,3);
    px('#000',-4,-3,2,2);px('#000',3,-3,2,2);
    // Mouth
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(0,2*s,2*s,0,Math.PI);ctx.fill();
  }
  
  // Wolf - dark wolf with glowing eyes
  else if(e.type==='wolf'){
    // Body
    ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(0,0,12*s,8*s,0,0,Math.PI*2);ctx.fill();
    // Head
    ctx.beginPath();ctx.ellipse(8*s,-2*s,6*s,5*s,0,0,Math.PI*2);ctx.fill();
    // Legs
    const lo=f%2?1:-1;
    px(c,-8,4,3,6);px(c,-3,4,3,6);
    px(c,2,4,3,6);px(c,7,4,3,6);
    // Ears
    px(c,10,-5,3,4);px(c,14,-5,3,4);
    // Eyes
    ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(10*s,-2*s,1.5*s,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(14*s,-2*s,1.5*s,0,Math.PI*2);ctx.fill();
  }
  
  // Skeleton - bony warrior
  else if(e.type==='skeleton'){
    // Bones
    ctx.fillStyle='#f0e0c0';
    // Torso
    px('#f0e0c0',-4,-6,9,10);
    // Head
    px('#f0e0c0',-4,-12,9,7);
    // Arms
    px('#f0e0c0',-8,0,3,8);px('#f0e0c0',6,0,3,8);
    // Legs
    px('#f0e0c0',-3,4,3,8);px('#f0e0c0',1,4,3,8);
    // Eyes
    ctx.fillStyle='#c22';ctx.beginPath();ctx.arc(0,-8*s,1.5*s,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(3*s,-8*s,1.5*s,0,Math.PI*2);ctx.fill();
    // Shield
    if(e.shieldUp>0){
      ctx.fillStyle='#aaa8';
      ctx.beginPath();ctx.arc(-8*s,0,6*s,0,Math.PI*2);ctx.fill();
    }
  }
  
  // Ghost - floating spirit
  else if(e.type==='ghost'){
    ctx.globalAlpha*=.5+Math.sin(gTime*3)*.15;
    // Body
    ctx.fillStyle=c;
    ctx.beginPath();ctx.arc(0,-2*s,12*s,Math.PI,0);ctx.fill();
    ctx.fillRect(-12*s,-2*s,24*s,12*s);
    // Wavy bottom
    ctx.beginPath();
    for(let i=0;i<10;i++){
      const x=-12*s+i*2.4*s;
      const y=10*s+Math.sin(gTime*5+i)*2*s;
      if(i===0)ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }
    ctx.fill();
    // Eyes
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-5*s,-6*s,3*s,0,Math.PI*2);ctx.fill();

    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(-5*s,-6*s,1*s,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(2*s,-6*s,1*s,0,Math.PI*2);ctx.fill();
  }
  
  // Demon - winged demon
  else if(e.type==='demon'){
    // Body
    px(c,-6,-4,13,10);
    // Head
    px(c,-5,-12,11,9);
    // Arms
    px(c,-8,0,3,8);px(c,6,0,3,8);
    // Legs
    px(c,-4,6,3,8);px(c,2,6,3,8);

    px('#880000',-6,-16,3,6);px('#880000',4,-16,3,6);
    // Wings
    ctx.fillStyle=c+'66';
    ctx.beginPath();ctx.moveTo(-8*s,-4*s);ctx.lineTo(-20*s,-14*s);ctx.lineTo(-14*s,0);ctx.fill();
    ctx.beginPath();ctx.moveTo(8*s,-4*s);ctx.lineTo(20*s,-14*s);ctx.lineTo(14*s,0);ctx.fill();
    // Eyes
    ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(-3*s,-9*s,2*s,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(1*s,-9*s,2*s,0,Math.PI*2);ctx.fill();
  }
  
  // Archer - shadow archer
  else if(e.type==='archer'){
    // Body
    px(c,-4,-6,9,12);
    // Legs
    px(c,-3,6,3,6);px(c,1,6,3,6);
    // Head
    px('#e8d0a0',-3,-12,7,7);
    // Arms
    px('#e8d0a0',-6,0,2,6);px('#e8d0a0',5,0,2,6);
    // Eyes
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-1*s,-10*s,1.5*s,0,Math.PI*2);ctx.fill();

    ctx.strokeStyle='#aa8';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(6*s,-8*s);ctx.quadraticCurveTo(12*s,-1*s,6*s,6*s);ctx.stroke();
  }
  
  // Mage - dark mage
  else if(e.type==='mage'){
    // Robe
    px('#6a4aaa',-5,-4,11,10);
    // Legs
    px(c,-3,6,3,6);px(c,1,6,3,6);
    // Head
    px('#e8d0a0',-3,-12,7,7);
    // Hat
    px('#aa88ff',-5,-16,11,5);
    // Staff
    ctx.fillStyle='#6a4a2a';ctx.fillRect(8*s,-8*s,2*s,16*s);
    // Crystal
    ctx.fillStyle='#ff8';ctx.beginPath();ctx.arc(9*s,-8*s,3*s,0,Math.PI*2);ctx.fill();
  }
  // Goblin - scavenger
  else if(e.type==='goblin'){
    px('#6a8a42',-4,-6,9,11);px('#5a7a36',-3,6,3,6);px('#5a7a36',1,6,3,6);
    px('#9ac36a',-3,-12,7,7);px('#e8d0a0',-6,0,2,5);px('#e8d0a0',5,0,2,5);
    ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(-1*s,-9*s,1.2*s,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(2*s,-9*s,1.2*s,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#765';ctx.fillRect(6*s,-4*s,2*s,10*s);
  }
  // Ogre - heavy brute
  else if(e.type==='ogre'){
    ctx.fillStyle='#8a6b4a';ctx.fillRect(-7*s,-8*s,14*s,18*s);
    ctx.fillStyle='#9f7c56';ctx.fillRect(-5*s,-16*s,10*s,9*s);
    ctx.fillStyle='#7e5e3e';ctx.fillRect(-11*s,-6*s,4*s,11*s);ctx.fillRect(7*s,-6*s,4*s,11*s);
    ctx.fillStyle='#ffd28a';ctx.fillRect(-3*s,-12*s,2*s,2*s);ctx.fillRect(1*s,-12*s,2*s,2*s);
    ctx.fillStyle='#654';ctx.fillRect(10*s,-10*s,3*s,18*s);
  }
  // Spider - venom crawler
  else if(e.type==='spider'){
    ctx.fillStyle='#325a34';ctx.beginPath();ctx.ellipse(0,0,8*s,6*s,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(8*s,0,6*s,5*s,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#4f8f56';ctx.lineWidth=1.3*s;
    for(let i=0;i<4;i++){const yy=(-4+i*3)*s;ctx.beginPath();ctx.moveTo(-1*s,yy);ctx.lineTo(-11*s,yy-4*s);ctx.stroke();ctx.beginPath();ctx.moveTo(7*s,yy);ctx.lineTo(17*s,yy-4*s);ctx.stroke();}
    ctx.fillStyle='#f44';ctx.beginPath();ctx.arc(10*s,-1*s,1.2*s,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(12*s,2*s,1.2*s,0,Math.PI*2);ctx.fill();
  }
  // Gargoyle - stone winged
  else if(e.type==='gargoyle'){
    px('#8e8f93',-5,-7,11,14);px('#a1a2a6',-4,-15,9,8);
    ctx.fillStyle='#787a7f';ctx.beginPath();ctx.moveTo(-6*s,-4*s);ctx.lineTo(-16*s,-13*s);ctx.lineTo(-10*s,2*s);ctx.fill();
    ctx.beginPath();ctx.moveTo(6*s,-4*s);ctx.lineTo(16*s,-13*s);ctx.lineTo(10*s,2*s);ctx.fill();
    ctx.fillStyle='#cff';ctx.beginPath();ctx.arc(-1*s,-11*s,1.2*s,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(2*s,-11*s,1.2*s,0,Math.PI*2);ctx.fill();

  // Elemental minibosses

    ctx.strokeStyle='#dff';ctx.lineWidth=1.2*s;ctx.beginPath();ctx.moveTo(-8*s,2*s);ctx.lineTo(0,-12*s);ctx.lineTo(8*s,2*s);ctx.stroke();
    ctx.fillStyle='#eafcff';ctx.beginPath();ctx.arc(-3*s,-4*s,1.5*s,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(3*s,-4*s,1.5*s,0,Math.PI*2);ctx.fill();
  }
  else if(e.type==='miniFire'){
    const g=ctx.createRadialGradient(0,-2*s,1,0,0,16*s);g.addColorStop(0,'#ffd4a0');g.addColorStop(1,'#db5b34');

    ctx.fillStyle='#fff2aa';ctx.beginPath();ctx.arc(-3*s,-3*s,1.4*s,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(3*s,-3*s,1.4*s,0,Math.PI*2);ctx.fill();

  else if(e.type==='miniThunder'){

    ctx.strokeStyle='#f7ec9a';ctx.lineWidth=1.4*s;ctx.beginPath();ctx.moveTo(-6*s,-8*s);ctx.lineTo(-1*s,-1*s);ctx.lineTo(-4*s,5*s);ctx.lineTo(4*s,-3*s);ctx.stroke();
    ctx.fillStyle='#fff7c8';ctx.beginPath();ctx.arc(-3*s,-3*s,1.4*s,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(3*s,-3*s,1.4*s,0,Math.PI*2);ctx.fill();
  }
  else if(e.type==='miniEarth'){

    ctx.fillStyle='#d8c4a8';ctx.beginPath();ctx.arc(-3*s,-3*s,1.3*s,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(3*s,-3*s,1.3*s,0,Math.PI*2);ctx.fill();
  }
  
  // Bear - giant bear
  else if(e.type==='bear'){

    // Eyes

    ctx.beginPath();ctx.arc(3*s,-10*s,2*s,0,Math.PI*2);ctx.fill();

    // Body
    px(c,-5,-8,11,16);
    // Legs
    px(c,-3,8,3,6);px(c,1,8,3,6);
    // Head
    px('#3a6a3a',-4,-14,9,7);
    // Eyes
    ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(-2*s,-12*s,1.5*s,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(2*s,-12*s,1.5*s,0,Math.PI*2);ctx.fill();

  // Boss - different bosses based on wave number
  else if(e.ai==='boss'||(e.type&&e.type.startsWith('boss'))){
    const rawBossId=parseInt((e.type||'').replace('boss',''),10);
    const bossType=Number.isFinite(rawBossId)?((rawBossId-1)%10+10)%10:(waveN-1)%10;
    const pulse=1+Math.sin(gTime*2)*.05,bs=s*pulse;

      ctx.fillStyle='#ff8800';ctx.fillRect(-9*bs,-24*bs,4*bs,8*bs);ctx.fillRect(5*bs,-24*bs,4*bs,8*bs);

      ctx.beginPath();ctx.arc(18*bs,-4*bs,2*bs,0,Math.PI*2);ctx.fill();
    }

      ctx.fillRect(-8*bs,-20*bs,16*bs,10*bs);

      ctx.fillRect(-18*bs,-8*bs,6*bs,16*bs);
      ctx.fillRect(12*bs,-8*bs,6*bs,16*bs);
      // Eyes
      ctx.fillStyle='#ff0';ctx.fillRect(-5*bs,-16*bs,3*bs,3*bs);
      ctx.fillRect(3*bs,-16*bs,3*bs,3*bs);
      // Fire aura
      const ag=ctx.createRadialGradient(0,0,15*bs,0,0,30*bs);
      ag.addColorStop(0,'rgba(255,80,40,.1)');ag.addColorStop(1,'rgba(255,80,40,0)');
      ctx.fillStyle=ag;ctx.beginPath();ctx.arc(0,0,30*bs,0,Math.PI*2);ctx.fill();
    }
    else if(bossType===3){ // Dark Knight
      ctx.fillStyle='#8844aa';

      ctx.fillRect(-8*bs,-6*bs,16*bs,12*bs);
      // Head
      ctx.fillRect(-5*bs,-14*bs,10*bs,8*bs);
      // Arms
      ctx.fillRect(-12*bs,-4*bs,4*bs,8*bs);
      ctx.fillRect(8*bs,-4*bs,4*bs,8*bs);
      // Sword
      ctx.fillStyle='#888';ctx.fillRect(12*bs,-6*bs,2*bs,12*bs);
      // Shield
      ctx.fillStyle='#666';ctx.beginPath();ctx.arc(-14*bs,0,6*bs,0,Math.PI*2);ctx.fill();
      // Eyes
      ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(-3*bs,-10*bs,1.5*bs,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(2*bs,-10*bs,1.5*bs,0,Math.PI*2);ctx.fill();
    }
    else if(bossType===4){ // Undead King
      ctx.fillStyle='#888888';
      // Body
      ctx.fillRect(-10*bs,-8*bs,20*bs,16*bs);
      // Head
      ctx.fillRect(-6*bs,-20*bs,12*bs,12*bs);
      // Crown
      ctx.fillStyle='#ffd700';ctx.fillRect(-8*bs,-24*bs,16*bs,4*bs);
      // Eyes
      ctx.fillStyle='#c22';ctx.beginPath();ctx.arc(-3*bs,-16*bs,2*bs,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(3*bs,-16*bs,2*bs,0,Math.PI*2);ctx.fill();
      // Aura
      const ag=ctx.createRadialGradient(0,0,15*bs,0,0,30*bs);
      ag.addColorStop(0,'rgba(160,40,40,.1)');ag.addColorStop(1,'rgba(160,40,40,0)');
      ctx.fillStyle=ag;ctx.beginPath();ctx.arc(0,0,30*bs,0,Math.PI*2);ctx.fill();
    }
    else if(bossType===5){ // Storm Lord
      ctx.fillStyle='#4488ff';
      // Body
      ctx.beginPath();ctx.ellipse(0,0,12*bs,10*bs,0,0,Math.PI*2);ctx.fill();
      // Head
      ctx.beginPath();ctx.ellipse(0,-12*bs,8*bs,7*bs,0,0,Math.PI*2);ctx.fill();
      // Lightning bolts
      ctx.strokeStyle='#ffd700';ctx.lineWidth=2*s;
      ctx.beginPath();ctx.moveTo(0,-20*bs);ctx.lineTo(-10*bs,-30*bs);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,-20*bs);ctx.lineTo(10*bs,-30*bs);ctx.stroke();
      // Eyes
      ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(-3*bs,-14*bs,2*bs,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(3*bs,-14*bs,2*bs,0,Math.PI*2);ctx.fill();
    }
    else if(bossType===6){ // Poison Queen
      ctx.fillStyle='#44aa44';
      // Body
      ctx.beginPath();ctx.ellipse(0,0,14*bs,12*bs,0,0,Math.PI*2);ctx.fill();
      // Head
      ctx.beginPath();ctx.ellipse(0,-14*bs,8*bs,8*bs,0,0,Math.PI*2);ctx.fill();
      // Tentacles
      for(let i=0;i<8;i++){
        const angle=i*Math.PI/4;
        const x=Math.cos(angle)*14*bs;
        const y=Math.sin(angle)*14*bs;
        ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(x,y);ctx.strokeStyle='#226622';ctx.lineWidth=3*s;ctx.stroke();
      }
      // Eyes
      ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(-3*bs,-16*bs,2*bs,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(3*bs,-16*bs,2*bs,0,Math.PI*2);ctx.fill();
    }
    else if(bossType===7){ // Mechanical Golem
      ctx.fillStyle='#888888';
      // Body
      ctx.fillRect(-12*bs,-10*bs,24*bs,20*bs);
      // Head
      ctx.fillRect(-6*bs,-20*bs,12*bs,10*bs);
      // Arms
      ctx.fillRect(-18*bs,-8*bs,6*bs,16*bs);
      ctx.fillRect(12*bs,-8*bs,6*bs,16*bs);
      // Eyes
      ctx.fillStyle='#00ff00';ctx.fillRect(-4*bs,-16*bs,3*bs,3*bs);
      ctx.fillRect(2*bs,-16*bs,3*bs,3*bs);
      // Gears
      ctx.fillStyle='#666';ctx.beginPath();ctx.arc(-15*bs,0,4*bs,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(15*bs,0,4*bs,0,Math.PI*2);ctx.fill();
    }
    else if(bossType===8){ // Chaos Demon
      ctx.fillStyle='#aa44ff';
      // Body
      ctx.beginPath();ctx.ellipse(0,0,15*bs,12*bs,0,0,Math.PI*2);ctx.fill();
      // Head
      ctx.beginPath();ctx.ellipse(0,-15*bs,10*bs,9*bs,0,0,Math.PI*2);ctx.fill();
      // Wings
      ctx.fillStyle='#8822cc';
      ctx.beginPath();ctx.moveTo(-10*bs,0);ctx.lineTo(-25*bs,-20*bs);ctx.lineTo(-20*bs,5*bs);ctx.fill();
      ctx.beginPath();ctx.moveTo(10*bs,0);ctx.lineTo(25*bs,-20*bs);ctx.lineTo(20*bs,5*bs);ctx.fill();
      // Horns
      ctx.fillStyle='#ff8800';
      ctx.beginPath();ctx.moveTo(-8*bs,-20*bs);ctx.lineTo(-12*bs,-30*bs);ctx.lineTo(-4*bs,-25*bs);ctx.fill();
      ctx.beginPath();ctx.moveTo(8*bs,-20*bs);ctx.lineTo(12*bs,-30*bs);ctx.lineTo(4*bs,-25*bs);ctx.fill();
      // Eyes
      ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(-4*bs,-18*bs,2*bs,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(4*bs,-18*bs,2*bs,0,Math.PI*2);ctx.fill();
    }
    else if(bossType===9){ // Final Guardian
      ctx.fillStyle='#ffaa00';
      // Body
      ctx.fillRect(-14*bs,-12*bs,28*bs,24*bs);
      // Head
      ctx.fillRect(-8*bs,-24*bs,16*bs,12*bs);
      // Shoulders
      ctx.fillRect(-18*bs,-10*bs,8*bs,10*bs);
      ctx.fillRect(10*bs,-10*bs,8*bs,10*bs);
      // Arms
      ctx.fillRect(-22*bs,-8*bs,6*bs,16*bs);
      ctx.fillRect(16*bs,-8*bs,6*bs,16*bs);
      // Eyes
      ctx.fillStyle='#ff0';ctx.fillRect(-5*bs,-20*bs,3*bs,3*bs);
      ctx.fillRect(3*bs,-20*bs,3*bs,3*bs);
      // Aura
      const ag=ctx.createRadialGradient(0,0,20*bs,0,0,40*bs);
      ag.addColorStop(0,'rgba(255,160,0,.1)');ag.addColorStop(1,'rgba(255,160,0,0)');
      ctx.fillStyle=ag;ctx.beginPath();ctx.arc(0,0,40*bs,0,Math.PI*2);ctx.fill();
    }
  }
  
  // Sacred beasts
  else if(e.type==='qinglong'){ // Azure Dragon
    const pulse=1+Math.sin(gTime*2.2)*.06,bs=s*pulse,tail=Math.sin(gTime*4)*2*bs;
    ctx.strokeStyle='#6be27a';ctx.lineWidth=2.2*bs;ctx.beginPath();
    ctx.moveTo(-22*bs,6*bs);ctx.quadraticCurveTo(-8*bs,16*bs,8*bs,6*bs+tail);ctx.quadraticCurveTo(18*bs,0,24*bs,-2*bs);ctx.stroke();
    const dg=ctx.createLinearGradient(-16*bs,-12*bs,16*bs,12*bs);dg.addColorStop(0,'#2e9f48');dg.addColorStop(1,'#6fe08c');
    ctx.fillStyle=dg;ctx.beginPath();ctx.ellipse(2*bs,2*bs,16*bs,10*bs,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#76f799';ctx.beginPath();ctx.ellipse(16*bs,-2*bs,8*bs,6*bs,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2b7f3d';for(let i=0;i<6;i++)ctx.fillRect((-14+i*5)*bs,(-9-Math.abs(i-2))*bs,2*bs,3*bs);
    ctx.fillStyle='#f8ff9c';ctx.beginPath();ctx.arc(18*bs,-3*bs,1.6*bs,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(80,220,120,.35)';ctx.beginPath();ctx.arc(0,0,24*bs,0,Math.PI*2);ctx.fill();
  }
  else if(e.type==='baihu'){ // White Tiger
    const pulse=1+Math.sin(gTime*2)*.05,bs=s*pulse;
    ctx.fillStyle='#f2f3f6';ctx.beginPath();ctx.ellipse(0,1*bs,16*bs,10*bs,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#d9dde6';ctx.beginPath();ctx.ellipse(12*bs,-2*bs,8*bs,7*bs,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#4d5d80';ctx.lineWidth=1.4*bs;
    for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo((-10+i*5)*bs,-7*bs);ctx.lineTo((-8+i*5)*bs,8*bs);ctx.stroke();}
    ctx.fillStyle='#f4d968';ctx.beginPath();ctx.arc(14*bs,-3*bs,1.5*bs,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f4d968';ctx.beginPath();ctx.arc(14*bs,1*bs,1.5*bs,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(180,200,255,.5)';ctx.lineWidth=1.1*bs;ctx.beginPath();ctx.arc(0,0,22*bs,0,Math.PI*2);ctx.stroke();
  }
  else if(e.type==='zhuque'){ // Vermilion Bird
    const pulse=1+Math.sin(gTime*2.6)*.07,bs=s*pulse,flap=Math.sin(gTime*8)*3*bs;
    const fg=ctx.createRadialGradient(0,0,2,0,0,20*bs);fg.addColorStop(0,'#ffb36b');fg.addColorStop(1,'#e23f2d');
    ctx.fillStyle=fg;ctx.beginPath();ctx.ellipse(0,0,13*bs,10*bs,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffdf95';ctx.beginPath();ctx.ellipse(11*bs,-1*bs,6*bs,5*bs,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,120,70,.85)';ctx.beginPath();ctx.moveTo(-4*bs,0);ctx.lineTo(-19*bs,-9*bs-flap*.25);ctx.lineTo(-10*bs,6*bs);ctx.fill();
    ctx.beginPath();ctx.moveTo(5*bs,0);ctx.lineTo(19*bs,-8*bs+flap*.25);ctx.lineTo(10*bs,6*bs);ctx.fill();
    ctx.fillStyle='#ffeb94';ctx.beginPath();ctx.arc(13*bs,-1*bs,1.6*bs,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,90,50,.32)';ctx.beginPath();ctx.arc(0,0,24*bs,0,Math.PI*2);ctx.fill();
  }
  else if(e.type==='xuanwu'){ // Black Tortoise
    const pulse=1+Math.sin(gTime*1.8)*.04,bs=s*pulse;
    ctx.fillStyle='#334066';ctx.beginPath();ctx.ellipse(0,1*bs,18*bs,13*bs,0,0,Math.PI*2);ctx.fill();
    const sg2=ctx.createRadialGradient(-2*bs,-2*bs,2,0,0,16*bs);sg2.addColorStop(0,'#61719b');sg2.addColorStop(1,'#202a45');
    ctx.fillStyle=sg2;ctx.beginPath();ctx.ellipse(0,0,15*bs,11*bs,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#7a8bb8';ctx.lineWidth=1*bs;
    for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(-11*bs,i*3*bs);ctx.lineTo(11*bs,i*3*bs);ctx.stroke();}
    ctx.fillStyle='#465a82';ctx.beginPath();ctx.ellipse(12*bs,0,6*bs,5*bs,0,0,Math.PI*2);ctx.fill();
    px('#3d4d70',-10,8,4,6);px('#3d4d70',-4,8,4,6);px('#3d4d70',4,8,4,6);px('#3d4d70',10,8,4,6);
    ctx.fillStyle='#ffe88a';ctx.beginPath();ctx.arc(14*bs,0,1.5*bs,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(90,130,210,.28)';ctx.beginPath();ctx.arc(0,0,23*bs,0,Math.PI*2);ctx.fill();
  }

  // Common lighting/outline pass for all enemy bodies
  const rg=ctx.createRadialGradient(0,-e.size*.15,1,0,0,e.size*1.3);
  rg.addColorStop(0,'rgba(255,255,255,.10)');
  rg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=rg;ctx.beginPath();ctx.arc(0,0,e.size*1.05,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=((e.ai==='boss')||['qinglong','baihu','zhuque','xuanwu'].includes(e.type))?'rgba(255,220,120,.45)':'rgba(255,255,255,.22)';
  ctx.lineWidth=Math.max(1,e.size*.06);ctx.beginPath();ctx.arc(0,0,e.size*.92,0,Math.PI*2);ctx.stroke();

  ctx.globalAlpha=1;
  if(e.hp<e.maxHp){const bw=Math.max(e.size*2,24);ctx.fillStyle='#200';ctx.fillRect(-bw/2,-e.size-8,bw,4);
    ctx.fillStyle=e.ai==='boss'?'#d4a':'#c22';ctx.fillRect(-bw/2,-e.size-8,bw*(e.hp/e.maxHp),4);
    if(e.ai==='boss'||e.neutral){ctx.fillStyle='#fff8';ctx.font='bold 8px monospace';ctx.textAlign='center';ctx.fillText(e.name,0,-e.size-12)}}
  ctx.restore();
}

function drawPlayer(){
  const p=player;if(p.hp<=0)return; // 玩家死亡，不绘制
  ctx.save();ctx.translate(p.x,p.y);
  if(p.flashT>0||p.invuln>0)ctx.globalAlpha=.4+Math.sin((p.flashT||p.invuln)*80)*.6;if(p.dashing)ctx.globalAlpha=.5;
  // Ground aura based on class/rarity
  const classAura=p.classId==='mage'?'rgba(110,90,255,.28)':p.classId==='ranger'?'rgba(80,190,130,.25)':'rgba(255,140,80,.24)';
  const ag=ctx.createRadialGradient(0,6,2,0,6,26);
  ag.addColorStop(0,classAura);ag.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ag;ctx.beginPath();ctx.ellipse(0,10,20,8,0,0,Math.PI*2);ctx.fill();
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(0,18,10,3,0,0,Math.PI*2);ctx.fill();
  const s=1.3,lo=p.animF%2?1:-1;
  const ac=p.equip.armor?RC[p.equip.armor.rarity]:(p.classData?.bodyColor||'#4466aa');
  const bc=p.equip.boots?RC[p.equip.boots.rarity]:'#334';
  const hc=p.equip.helmet?RC[p.equip.helmet.rarity]:(p.classData?.helmetColor||'#8B4513');
  const colors={armor:ac,boots:bc,helmet:hc};
  // Use class-specific sprite if available
  const cl=p.classData||CLASSES[p.classId];
  if(cl&&cl.drawSprite){cl.drawSprite(ctx,s,lo,colors)}
  else{
    // Fallback generic sprite
    ctx.fillStyle=bc;ctx.fillRect(-4*s,(8+lo)*s,3*s,6*s);ctx.fillRect(1*s,(8-lo)*s,3*s,6*s);
    ctx.fillStyle=ac;ctx.fillRect(-5*s,-2*s,10*s,10*s);ctx.fillRect(-7*s,-2*s,3*s,3*s);ctx.fillRect(4*s,-2*s,3*s,3*s);
    ctx.fillStyle='#e8d0a0';ctx.fillRect(-7*s,0,2*s,6*s);ctx.fillRect(5*s,0,2*s,6*s);
    ctx.fillStyle='#e8d0a0';ctx.fillRect(-4*s,-10*s,8*s,8*s);
    ctx.fillStyle=hc;ctx.fillRect(-5*s,-12*s,10*s,4*s);
    ctx.fillStyle='#fff';ctx.fillRect(-2*s,-8*s,2*s,2*s);ctx.fillRect(1*s,-8*s,2*s,2*s);
  }
  // Cape from amulet
  if(p.equip.amulet){ctx.fillStyle=RC[p.equip.amulet.rarity]+'88';ctx.fillRect(-4*s,6*s,8*s,6*s)}
  // Ring glow
  if(p.equip.ring){ctx.strokeStyle=RC[p.equip.ring.rarity]+'44';ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.stroke()}
  // Weapon glow
  if(p.equip.weapon&&p.equip.weapon.rarity>=2){const wg=ctx.createRadialGradient(15*s,0,0,15*s,0,10*s);wg.addColorStop(0,RC[p.equip.weapon.rarity]+'44');wg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=wg;ctx.beginPath();ctx.arc(15*s,0,10*s,0,Math.PI*2);ctx.fill()}
  // Attack swing
  if(p.attacking){ctx.save();ctx.rotate(p.atkAng);ctx.strokeStyle='rgba(255,220,150,.5)';ctx.lineWidth=4;ctx.shadowColor='#fa8';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(0,0,40,-Math.PI/3,Math.PI/3);ctx.stroke();ctx.shadowBlur=0;
    const wc=p.equip.weapon?RC[p.equip.weapon.rarity]:'#ccc';ctx.fillStyle='#654';ctx.fillRect(14,-2,6,4);ctx.fillStyle=wc;ctx.fillRect(20,-2,22,3);ctx.fillStyle='#fff8';ctx.fillRect(20,-2,22,1);ctx.restore()}
  if(p.attacking){
    const trail=ctx.createRadialGradient(0,0,4,0,0,42);
    trail.addColorStop(0,'rgba(255,240,160,.16)');trail.addColorStop(1,'rgba(255,240,160,0)');
    ctx.fillStyle=trail;ctx.beginPath();ctx.arc(0,0,42,0,Math.PI*2);ctx.fill();
  }
  // Sword aura
  if(p.swordAura>0){for(let i=0;i<5;i++){const a=p.swordAuraT*3.5+i*Math.PI*2/5,sx=Math.cos(a)*35,sy=Math.sin(a)*35;
    ctx.save();ctx.translate(sx,sy);ctx.rotate(a+Math.PI/2);ctx.fillStyle='#aaf';ctx.fillRect(-1,-8,2,16);ctx.fillStyle='#ccf';ctx.fillRect(-2,-10,4,4);ctx.restore()}}
  ctx.restore();
}

function drawHUD(){
  const p=player;
  // 总是绘制HUD，即使玩家死亡
  // HP bar
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(14,14,210,20);
  ctx.fillStyle='#8b1a1a';ctx.fillRect(16,16,206*(p.hp/p.maxHp),16);ctx.fillStyle='#c41e1e';ctx.fillRect(16,16,206*(p.hp/p.maxHp),8);
  ctx.fillStyle='#fff';ctx.font='11px monospace';ctx.textAlign='left';ctx.fillText('HP '+~~p.hp+'/'+p.maxHp,22,30);
  // Mana
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(14,38,210,16);
  ctx.fillStyle='#1a3a6b';ctx.fillRect(16,40,206*(p.mana/p.maxMana),12);ctx.fillStyle='#2a6ac4';ctx.fillRect(16,40,206*(p.mana/p.maxMana),6);
  ctx.fillStyle='#fff';ctx.font='10px monospace';ctx.textAlign='left';ctx.fillText('MP '+~~p.mana+'/'+p.maxMana,22,50);
  ctx.fillStyle='#aa8';ctx.font='11px monospace';
  const clName=p.classData?p.classData.name:'';
  ctx.fillText(clName+' Lv.'+p.level+' 击杀:'+kills+' 💰'+p.gold+' 🔑'+p.skillPts,16,70);
  // Weapon evolution progress
  if(p.equip.weapon&&p.equip.weapon.isStartWeapon&&selectedClass){
    const evList=CLASSES[selectedClass].weapon.evolve;
    let nextEvo=null;for(const ev of evList){if(ev.kills>kills){nextEvo=ev;break}}
    if(nextEvo){
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(14,74,160,10);
      const prevKills=p.equip.weapon._evoKills||0;
      const prog=(kills-prevKills)/(nextEvo.kills-prevKills);
      ctx.fillStyle='#6a4a2a';ctx.fillRect(15,75,158*Math.min(1,prog),8);
      ctx.fillStyle=RC[p.equip.weapon.rarity];ctx.fillRect(15,75,158*Math.min(1,prog),4);
      ctx.fillStyle='#cca';ctx.font='8px monospace';ctx.fillText(p.equip.weapon.icon+' '+p.equip.weapon.name+' → '+nextEvo.name+' ('+kills+'/'+nextEvo.kills+')',18,82);
    } else{
      ctx.fillStyle=RC[4];ctx.font='8px monospace';ctx.fillText(p.equip.weapon.icon+' '+p.equip.weapon.name+' [满级]',18,82);
    }
  }
  // Fort HP top center
  const fbw=240;ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(W/2-fbw/2-2,8,fbw+4,22);
  const fhr=fort.hp/fort.maxHp;ctx.fillStyle=fhr>.5?'#2a6a3a':'#8b1a1a';ctx.fillRect(W/2-fbw/2,10,fbw*fhr,18);
  ctx.fillStyle=fhr>.5?'#4a8':'#c44';ctx.fillRect(W/2-fbw/2,10,fbw*fhr,9);
  ctx.fillStyle='#fff';ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.fillText('🏰 堡垒 '+fort.hp+'/'+fort.maxHp,W/2,24);
  // Wave info
  ctx.fillStyle='#f0c040';ctx.font='bold 12px monospace';ctx.textAlign='right';
  if(waveOn)ctx.fillText('第'+waveN+'波 剩余:'+enemies.filter(e=>!e.neutral).length,W-160,24);
  else{const rem=Math.ceil(nextWD-waveT);ctx.fillText('下一波:'+rem+'秒 (第'+(waveN+1)+'波)',W-160,24);
    if(rem<=5){ctx.fillStyle='#f44';ctx.fillText('即将来袭!',W-160,40)}}
  if((waveN+1)%5===0&&!waveOn){ctx.fillStyle='#d4a';ctx.fillText('下波BOSS!',W-160,waveN>0?40:24)}
  // XP
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(W/2-160,H-24,320,12);
  ctx.fillStyle='#4a6a2a';ctx.fillRect(W/2-159,H-23,318*(p.xp/p.xpN),10);
  ctx.fillStyle='#aa8';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText('经验 '+p.xp+'/'+p.xpN,W/2,H-15);

  // WC3-style skill grid - show only class skills
  const cl2=player.classData||CLASSES[player.classId];
  const classSkIds=cl2?cl2.availSkills:['q','ice','e','r','t','f','g','storm','frost'];
  const skDefsByClass={
    warrior:{
      r:{icon:'💥',key:'R'},
      e:{icon:'💨',key:'E'},
      g:{icon:'⚔',key:'G'},
      warcry:{icon:'🦁',key:'W'},
      whirlwind:{icon:'🌪',key:'V'}
    },
    mage:{
      q:{icon:'🔥',key:'Q'},
      f:{icon:'⚡',key:'F'},
      storm:{icon:'🌋',key:'X'},
      frost:{icon:'🧊',key:'C'}
    },
    ranger:{
      q:{icon:'🏹',key:'Q'},
      e:{icon:'💨',key:'E'},
      frost:{icon:'🧊',key:'C'},
      multi:{icon:'🔫',key:'M'},
      haste:{icon:'💨',key:'H'}
    }
  };
  const skDefs=skDefsByClass[player.classId]||{};
  const classSk=classSkIds.map(id=>skDefs[id]?({id,...skDefs[id]}):null).filter(Boolean);
  const gridCols=Math.min(classSk.length,3);
  const gridRows=Math.ceil(classSk.length/gridCols);
  const gx=W-20-gridCols*44,gy=H-20-gridRows*44,cs=44;
  ctx.textAlign='center';
  for(let i=0;i<classSk.length;i++){
    const row=~~(i/gridCols),col=i%gridCols,sx=gx+col*cs,sy=gy+row*cs;
    const sk=classSk[i],lv=skLv(sk.id),cd=player.skillCds[sk.id]?.cd||0,maxCd=skCd(sk.id);
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(sx,sy,40,40);
    if(lv===0){ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(sx,sy,40,40);ctx.fillStyle='#333';ctx.font='14px monospace';ctx.fillText('🔒',sx+20,sy+24)}
    else{
      const ratio=Math.max(0,cd/maxCd);
      if(ratio>0){ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(sx,sy+(1-ratio)*40,40,40*ratio)}
      ctx.font='18px serif';ctx.fillStyle=ratio>0?'#555':'#fff';ctx.fillText(sk.icon,sx+20,sy+22);
      if(ratio>0){ctx.fillStyle='#f44';ctx.font='bold 10px monospace';ctx.fillText(cd.toFixed(1),sx+20,sy+38)}}
    ctx.strokeStyle=lv>0?(cd>0?'#443':'#886'):'#222';ctx.lineWidth=1.5;ctx.strokeRect(sx,sy,40,40);
    ctx.font='bold 7px monospace';ctx.fillStyle=lv>0?'#cc8':'#444';ctx.fillText(sk.key,sx+20,sy+10);
    if(lv>0){ctx.fillStyle='#4a8';ctx.font='6px monospace';ctx.fillText('Lv'+lv,sx+20,sy-2)}
  }
  // Bottom-left potion quick bar
  const pots=player.inventory.filter(it=>it.type==='consumable');
  const pbCnt=6,pbSize=34,pbGap=6,pbW=pbCnt*pbSize+(pbCnt-1)*pbGap;
  let pbx=96,pby=H-46;
  const kb=document.getElementById('keybindings');
  if(kb&&kb.style.display!=='none'){
    const r=kb.getBoundingClientRect();
    const preferX=r.right+14;
    if(preferX+pbW+10<W){pbx=preferX}
    else pbx=Math.max(10,Math.min((W-pbW)/2,W-pbW-10));
  }
  ctx.fillStyle='rgba(0,0,0,.38)';ctx.fillRect(pbx-10,pby-12,pbW+20,52);
  ctx.strokeStyle='rgba(240,192,64,.35)';ctx.lineWidth=1;ctx.strokeRect(pbx-10,pby-12,pbW+20,52);
  ctx.textAlign='center';
  for(let i=0;i<pbCnt;i++){
    const x=pbx+i*(pbSize+pbGap),y=pby;
    ctx.fillStyle='rgba(18,16,12,.85)';ctx.fillRect(x,y,pbSize,pbSize);
    ctx.strokeStyle='rgba(130,110,60,.65)';ctx.strokeRect(x,y,pbSize,pbSize);
    const it=pots[i];
    if(it){
      ctx.fillStyle=RC[it.rarity]+'55';ctx.fillRect(x+1,y+1,pbSize-2,pbSize-2);
      ctx.font='16px serif';ctx.fillStyle='#fff';ctx.fillText(it.icon||'🧪',x+pbSize/2,y+21);
      ctx.font='bold 9px monospace';ctx.fillStyle='#ffe8a0';ctx.fillText('x'+(it.qty||1),x+pbSize-10,y+30);
    }
    ctx.font='bold 8px monospace';ctx.fillStyle='#a99';ctx.fillText(String(i+1),x+7,y+8);
  }
  ctx.font='bold 9px monospace';ctx.fillStyle='#b79a58';ctx.fillText('药水栏 1-6 快速使用',pbx+pbW/2,pby+46);
  // Active quest tracker
  const activeQ=quests.filter(q=>q.accepted&&!q.done)
    .sort((a,b)=>((b.tracked?1:0)-(a.tracked?1:0))||((b.priority||0)-(a.priority||0)));
  if(activeQ.length){let qy=84;ctx.textAlign='left';
    activeQ.forEach(q=>{ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(14,qy,140,14);
      ctx.fillStyle=q.prog>=q.need?'#4f4':(q.tracked?'#ffd36a':'#aa8');ctx.font='9px monospace';
      ctx.fillText((q.tracked?'★ ':'')+q.name+' '+q.prog+'/'+q.need,18,qy+10);qy+=16})}
  // Buffs
  let by=activeQ.length?84+activeQ.length*16:84;
  if(p.swordAura>0){ctx.fillStyle='rgba(120,120,200,.3)';ctx.fillRect(16,by,90,14);ctx.fillStyle='#aaf';ctx.font='10px monospace';ctx.textAlign='left';ctx.fillText('⚔ 剑阵 '+p.swordAura.toFixed(1)+'s',20,by+11);by+=16}
  p.buffs.forEach(b=>{ctx.fillStyle='rgba(200,120,60,.3)';ctx.fillRect(16,by,90,14);ctx.fillStyle='#f84';ctx.font='10px monospace';ctx.textAlign='left';ctx.fillText('🔥 狂暴 '+b.time.toFixed(1)+'s',20,by+11);by+=16});
}
function drawMinimap(){
  const mw=120,mh=120,mx=W-mw-12,my=42;
  ctx.fillStyle='rgba(6,8,4,.85)';ctx.fillRect(mx-1,my-1,mw+2,mh+2);
  ctx.strokeStyle='#3a3820';ctx.lineWidth=1.5;ctx.strokeRect(mx-1,my-1,mw+2,mh+2);
  const sc=mw/MW;
  for(let ty=0;ty<MH;ty+=2)for(let tx=0;tx<MW;tx+=2){
    const t=map[ty][tx];
    const inF=Math.abs(tx-FX)<FR&&Math.abs(ty-FY)<FR;
    ctx.fillStyle=t===0?(inF?'#222a20':'#1a1e12'):t===1?'#2a2820':'#4a4a5a';
    ctx.fillRect(mx+tx*sc,my+ty*sc,Math.ceil(sc*2),Math.ceil(sc*2))}
  // Fortress highlight
  ctx.fillStyle='#f0c04044';ctx.fillRect(mx+(FX-FR)*sc,my+(FY-FR)*sc,FR*2*sc,FR*2*sc);
  ctx.strokeStyle='#f0c04066';ctx.lineWidth=.5;ctx.strokeRect(mx+(FX-FR)*sc,my+(FY-FR)*sc,FR*2*sc,FR*2*sc);
  // Entities
  ctx.fillStyle='#0f0';ctx.fillRect(mx+player.x/T*sc-1.5,my+player.y/T*sc-1.5,4,4);
  ctx.fillStyle='#f44';enemies.forEach(e=>ctx.fillRect(mx+e.x/T*sc,my+e.y/T*sc,2,2));
  ctx.fillStyle='#fa0';neutralCamps.forEach(c=>c.enemies.forEach(e=>ctx.fillRect(mx+e.x/T*sc,my+e.y/T*sc,2,2)));
  ctx.fillStyle='#ff0';loot.forEach(l=>ctx.fillRect(mx+l.x/T*sc,my+l.y/T*sc,1.5,1.5));
  // View range indicator
  const vrx=mx+(cam.x-W/2)/T*sc,vry=my+(cam.y-H/2)/T*sc,vrw=W/T*sc,vrh=H/T*sc;
  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=.5;ctx.strokeRect(vrx,vry,vrw,vrh);
}

// ============ GAME LOOP ============
let lastT=0;
function loop(time){const dt=Math.min(.05,(time-lastT)/1000);lastT=time;try{update(dt);draw()}catch(e){console.error('LOOP ERR:',e)}requestAnimationFrame(loop)}
function startGame(){
  try{
  if(!selectedClass)selectedClass='warrior';
  initA();genMap();player=createPlayer();enemies=[];eProj=[];projectiles=[];particles=[];loot=[];fTexts=[];aoes=[];
  fort={hp:1200,maxHp:1200,x:FX*T,y:FY*T};
  fortNoHitTime=0;fortRegenTick=0;
  kills=0;gTime=0;waveN=0;waveT=0;waveOn=0;nextWD=12;
  
  // Add initial items and materials
  addToInv({name:'生命药水',icon:'❤',slot:'consumable',type:'consumable',effect:'hp',value:50,rarity:0,id:'potion1',qty:2});
  addToInv({name:'法力药水',icon:'💙',slot:'consumable',type:'consumable',effect:'mana',value:50,rarity:0,id:'potion2',qty:2});
  addToInv({name:'铁锭',icon:'🔨',id:'ironIngot',type:'material',qty:3});
  addToInv({name:'银锭',icon:'⚜',id:'silverIngot',type:'material',qty:2});
  addToInv({name:'优质皮革',icon:'🧴',id:'leather',type:'material',qty:2});
  addToInv({name:'魔法布料',icon:'🧵',id:'cloth',type:'material',qty:2});
  
  // Add class-specific initial materials
  switch(player.classId){
    case 'warrior':
      addToInv({name:'火焰精华',icon:'🔥',id:'fireEssence',type:'material',qty:1});
      break;
    case 'mage':
      addToInv({name:'暗影精华',icon:'💀',id:'shadowEssence',type:'material',qty:1});
      addToInv({name:'魔法水晶',icon:'💎',id:'crystal',type:'material',qty:1});
      break;
    case 'ranger':
      addToInv({name:'圣光精华',icon:'⭐',id:'holyEssence',type:'material',qty:1});
      addToInv({name:'优质皮革',icon:'🧴',id:'leather',type:'material',qty:1});
      break;

  }
  spawnNeutrals();initQuests();markRoads();genTerrainDecos();prerenderBG();
  cam.x=player.x;cam.y=player.y;gs='playing';
  document.getElementById('startScreen').style.display='none';
  document.getElementById('deathScreen').style.display='none';closeUI();
  lastT=performance.now();requestAnimationFrame(loop);
  }catch(e){console.error('startGame error:',e)}
}
document.getElementById('playBtn').onclick=startGame;
document.getElementById('restartBtn').onclick=startGame;
document.getElementById('reselectBtn').onclick=function(){
  document.getElementById('deathScreen').style.display='none';
  document.getElementById('startScreen').style.display='flex';
  gs='start';
};

// --- ANIMATED START SCREEN BACKGROUND ---
(function(){
  const bgC=document.getElementById('bgFX');if(!bgC)return;
  const bx=bgC.getContext('2d');let bw,bh;
  function bResize(){bw=bgC.width=innerWidth;bh=bgC.height=innerHeight}
  bResize();addEventListener('resize',bResize);
  // Particles: embers, dust, dark motes
  const sparks=[];for(let i=0;i<80;i++)sparks.push({
    x:Math.random()*2000,y:Math.random()*1200,
    vx:(Math.random()-.5)*.3,vy:-0.2-Math.random()*.6,
    size:1+Math.random()*2.5,life:Math.random()*6,ml:3+Math.random()*5,
    color:Math.random()>.6?'#f0a020':Math.random()>.5?'#d06020':'#804010'
  });
  // Distant fortress silhouette towers
  const towers=[];for(let i=0;i<7;i++)towers.push({
    x:.1+Math.random()*.8,w:20+Math.random()*40,h:60+Math.random()*120,
    hasTop:Math.random()>.3
  });
  function bDraw(t){
    t/=1000;
    bx.fillStyle='#000';bx.fillRect(0,0,bw,bh);
    // Dark gradient sky
    const sky=bx.createLinearGradient(0,0,0,bh);
    sky.addColorStop(0,'#050508');sky.addColorStop(.4,'#0a0810');sky.addColorStop(.65,'#120a0a');sky.addColorStop(1,'#0a0604');
    bx.fillStyle=sky;bx.fillRect(0,0,bw,bh);
    // Subtle stars
    bx.fillStyle='rgba(255,255,220,.3)';
    for(let i=0;i<30;i++){
      const sx=(i*137.5+50)%bw,sy=(i*97.3+20)%(bh*.4);
      const twinkle=.3+Math.sin(t*2+i*1.7)*.3;
      bx.globalAlpha=twinkle;bx.fillRect(sx,sy,1,1);
    }
    bx.globalAlpha=1;
    // Moon
    const moonX=bw*.75,moonY=bh*.15,moonR=22;
    const mg=bx.createRadialGradient(moonX,moonY,moonR*.3,moonX,moonY,moonR*3);
    mg.addColorStop(0,'rgba(200,190,170,.12)');mg.addColorStop(.3,'rgba(160,150,130,.04)');mg.addColorStop(1,'rgba(0,0,0,0)');
    bx.fillStyle=mg;bx.fillRect(moonX-moonR*4,moonY-moonR*4,moonR*8,moonR*8);
    bx.fillStyle='rgba(200,190,170,.15)';bx.beginPath();bx.arc(moonX,moonY,moonR,0,Math.PI*2);bx.fill();
    // Fortress silhouette
    const gy=bh*.62;
    bx.fillStyle='#0c0a08';
    towers.forEach(tw=>{
      const tx2=tw.x*bw,ty2=gy-tw.h;
      bx.fillRect(tx2-tw.w/2,ty2,tw.w,tw.h+bh*.4);
      if(tw.hasTop){bx.fillRect(tx2-tw.w/2-4,ty2-6,tw.w+8,8);
        for(let c=0;c<Math.floor(tw.w/8);c++)bx.fillRect(tx2-tw.w/2+c*8,ty2-12,4,7)}
    });
    // Ground silhouette
    bx.fillStyle='#080604';bx.fillRect(0,gy+10,bw,bh-gy);
    // Ground line glow
    const gg=bx.createLinearGradient(0,gy-10,0,gy+30);
    gg.addColorStop(0,'rgba(0,0,0,0)');gg.addColorStop(.5,'rgba(200,100,30,.03)');gg.addColorStop(1,'rgba(0,0,0,0)');
    bx.fillStyle=gg;bx.fillRect(0,gy-10,bw,40);
    // Window lights on towers
    towers.forEach(tw=>{if(!tw.hasTop)return;
      const tx2=tw.x*bw,ty2=gy-tw.h;
      const flick=.5+Math.sin(t*3+tw.x*10)*.3;
      bx.fillStyle=`rgba(255,180,60,${flick*.2})`;
      bx.fillRect(tx2-3,ty2+tw.h*.3,6,8);
      bx.fillRect(tx2-3,ty2+tw.h*.6,6,8);
      const wg=bx.createRadialGradient(tx2,ty2+tw.h*.45,0,tx2,ty2+tw.h*.45,30);
      wg.addColorStop(0,`rgba(255,160,60,${flick*.06})`);wg.addColorStop(1,'rgba(0,0,0,0)');
      bx.fillStyle=wg;bx.fillRect(tx2-30,ty2+tw.h*.3,60,60);
    });
    // Ember particles
    sparks.forEach(s=>{
      s.x+=s.vx+Math.sin(t+s.ml)*0.2;s.y+=s.vy;s.life-=1/60;
      if(s.life<=0){s.x=Math.random()*bw;s.y=bh*.5+Math.random()*bh*.5;s.life=s.ml;s.vx=(Math.random()-.5)*.3}
      const a=Math.min(1,s.life/s.ml)*0.7;
      bx.globalAlpha=a;bx.fillStyle=s.color;bx.fillRect(s.x,s.y,s.size,s.size);
    });
    bx.globalAlpha=1;
    // Low fog
    for(let i=0;i<4;i++){
      const fogX=((t*15+i*300)%(bw+400))-200;
      const fogY=gy+20+i*30;
      const fg2=bx.createRadialGradient(fogX,fogY,0,fogX,fogY,120+i*30);
      fg2.addColorStop(0,'rgba(60,50,40,.04)');fg2.addColorStop(1,'rgba(0,0,0,0)');
      bx.fillStyle=fg2;bx.fillRect(fogX-200,fogY-100,400,200);
    }
    if(document.getElementById('startScreen').style.display!=='none')requestAnimationFrame(bDraw);
  }
  requestAnimationFrame(bDraw);
})();
</script>
