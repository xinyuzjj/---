<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" vid="3">
    <title vid="4">NEXUS PRO | Narrative Experience</title>
    <style vid="5">
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;700&family=Syncopate:wght@400;700&display=swap');

        :root {
            --bg-base: #0a0a0a;
            --amber: #c69c76;
            --amber-glow: rgba(198, 156, 118, 0.4);
            --text-main: #f0f0f0;
            --text-dim: #555;
            --font-tech: 'Syncopate', sans-serif;
            --font-body: 'Manrope', sans-serif;
            --grid-edge: 5vw;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            height: 200vh; 
        }

        
        .bg-texture {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1a1a1c 0%, #0a0a0a 100%);
            z-index: -2;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.3;
        }

        
        .giant-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1;
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        .giant-text {
            font-family: var(--font-tech);
            font-size: 18vw;
            line-height: 0.8;
            letter-spacing: -0.05em;
            color: rgba(255, 255, 255, 0.05);
            text-align: center;
            text-transform: uppercase;
        }

        
        .product-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 2000px;
            z-index: 2;
        }

        .desk-wrapper {
            position: relative;
            width: 700px;
            height: 400px;
            transform-style: preserve-3d;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(50deg) rotateZ(-25deg); }
            50% { transform: translateY(-30px) rotateX(55deg) rotateZ(-20deg); }
        }

        .desk-surface {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #222, #000);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }

        .charge-ring {
            position: absolute;
            top: 50%; right: 20%;
            transform: translate(50%, -50%);
            width: 120px; height: 120px;
            border: 2px dashed var(--amber);
            border-radius: 50%;
            animation: spin 10s linear infinite;
        }

        @keyframes spin { from { transform: translate(50%, -50%) rotate(0deg); } to { transform: translate(50%, -50%) rotate(360deg); } }

        
        .callout {
            position: absolute;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
            font-family: var(--font-tech);
            pointer-events: auto;
        }

        .callout-line {
            width: 100px;
            height: 1px;
            background: var(--amber);
            position: relative;
        }

        .callout-line::after {
            content: '';
            position: absolute;
            right: 0; top: -2px;
            width: 5px; height: 5px;
            background: var(--amber);
            border-radius: 50%;
        }

        .callout-content {
            background: rgba(10, 10, 10, 0.8);
            border-left: 2px solid var(--amber);
            padding: 10px 15px;
            backdrop-filter: blur(10px);
        }

        .callout-title { font-size: 0.7rem; color: var(--amber); letter-spacing: 0.2em; }
        .callout-desc { font-family: var(--font-body); font-size: 0.65rem; color: var(--text-main); max-width: 150px; margin-top: 4px; }

        
        .c1 { top: -20%; left: 10%; }
        .c2 { bottom: -10%; right: -5%; }
        .c3 { top: 40%; left: -15%; }

        
        .specs-timeline {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            overflow: hidden;
            z-index: 100;
            padding: 0 var(--grid-edge);
        }

        .timeline-track {
            display: flex;
            gap: 80px;
            white-space: nowrap;
        }

        .spec-item {
            display: flex;
            flex-direction: column;
        }

        .spec-label {
            font-family: var(--font-tech);
            font-size: 0.6rem;
            color: var(--amber);
            letter-spacing: 0.2em;
            margin-bottom: 5px;
        }

        .spec-val {
            font-size: 1.1rem;
            font-weight: 200;
            color: var(--text-main);
        }

        
        nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 40px var(--grid-edge);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .logo { font-family: var(--font-tech); color: var(--amber); letter-spacing: 0.4em; text-decoration: none; font-weight: 700; }

        .cta-floating {
            background: var(--amber);
            color: #000;
            padding: 12px 30px;
            border-radius: 40px;
            font-family: var(--font-tech);
            font-size: 0.7rem;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 0 20px var(--amber-glow);
            transition: 0.3s;
        }

        .cta-floating:hover { transform: scale(1.05); background: #fff; }

        
        .scroll-reveal {
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

    </style>
</head>
<body vid="6">

    <div class="scanlines" vid="7"></div>
    <div class="bg-texture" vid="8"></div>

    <nav vid="9">
        <a href="#" class="logo" vid="10">NEXUS</a>
        <a href="#" class="cta-floating" vid="11">PRE-ORDER</a>

    <div class="giant-header" id="mainHeader" vid="12">
        <div class="giant-text" vid="13">NEXUS<br vid="14">PRO</div>

        <div class="desk-wrapper" id="desk" vid="16">
            <div class="desk-surface" vid="17">

            <div class="callout c1" vid="19">
                <div class="callout-content" vid="20">

                </div>

                    <div class="callout-desc" vid="28">Hidden 15W Qi-Certified Coil.</div>
                </div>
            </div>

            <div class="callout c3" vid="29">
                <div class="callout-content" vid="30">

                </div>
                <div class="callout-line" vid="33"></div>

        </div>
    </div>

    <div class="specs-timeline" vid="34">
        <div class="timeline-track" vid="35">
            <div class="spec-item" vid="36">
                <div class="spec-label" vid="37">WIDTH</div>
                <div class="spec-val" vid="38">1500MM</div>
            </div>
            <div class="spec-item" vid="39">
                <div class="spec-label" vid="40">POWER</div>
                <div class="spec-val" vid="41">100W PD</div>
            </div>
            <div class="spec-item" vid="42">
                <div class="spec-label" vid="43">SURFACE</div>
                <div class="spec-val" vid="44">ETCHED GLASS</div>
            </div>
            <div class="spec-item" vid="45">
                <div class="spec-label" vid="46">LOAD</div>
                <div class="spec-val" vid="47">120KG MAX</div>
            </div>
            <div class="spec-item" vid="48">
                <div class="spec-label" vid="49">I/O</div>

            <div class="spec-item" vid="51">

        </div>
    </div>

    <script vid="54">
        window.addEventListener('scroll', () => {
            const scrolled = window.scrollY;
            const viewportHeight = window.innerHeight;
            
            
            const header = document.getElementById('mainHeader');
            const opacity = 1 - (scrolled / (viewportHeight * 0.5));
            header.style.opacity = Math.max(0, opacity);
            header.style.transform = `translateY(${scrolled * 0.2}px)`;

            
            const desk = document.getElementById('desk');
            const zoom = 1 + (scrolled / viewportHeight) * 0.2;
            const rotationOffset = scrolled / 10;
            desk.style.transform = `translateY(0) rotateX(${50 + (scrolled/20)}deg) rotateZ(${-25 + (scrolled/15)}deg) scale(${zoom})`;
            
            
            const timeline = document.querySelector('.timeline-track');
            timeline.style.transform = `translateX(-${scrolled * 0.5}px)`;
        });
    </script>


</body></html>
